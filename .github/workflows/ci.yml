name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Pint, PHPUnit, migrations
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Laravel / PHPUnit)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, zip
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Verify immutable release snapshots
        run: bash tests/Deployment/immutable-release-snapshot.sh

      - name: Copy .env and generate key
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array

      - name: Run PHPUnit tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: secret
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript, Vitest, Vite build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Vitest / Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest with coverage
        run: npx vitest run --coverage

      - name: Vite production build
        run: npx vite build

  # ---------------------------------------------------------------------------
  # Arena sidecar — OCPM pytest incl. the Part X (X4) PM-LLM-Benchmark copilot
  # eval harness (model-discovery quality via conformance-fitness). §X.8.4: a
  # copilot release that regresses model fitness does not ship.
  # ---------------------------------------------------------------------------
  arena:
    name: Arena sidecar (pytest / pm4py)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: arena/requirements.txt

      - name: Install dependencies
        working-directory: arena
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run OCPM + copilot eval tests
        working-directory: arena
        run: python -m pytest tests -q
