name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend — quality/migrations plus deterministic PHPUnit shards
  # ---------------------------------------------------------------------------
  backend-quality:
    name: Backend (Laravel / quality)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      HUMMINGBIRD_PATIENT_CONTEXT_KEY: test-hummingbird-patient-context-key-v1
      APP_URL: http://zephyrus.test
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: zephyrus_test
      DB_USERNAME: zephyrus
      DB_PASSWORD: secret
      TEST_DB_ISOLATION: "true"
      TEST_DB_ADMIN_DATABASE: postgres
      TEST_NETWORK_GUARD: "true"
      INTEGRATION_SECRET_FILE_ROOT: storage/framework/testing/secrets
      OIDC_ENABLED: "false"
      OIDC_DISCOVERY_URL: https://idp.test/.well-known/openid-configuration
      OIDC_REDIRECT_URI: https://zephyrus.test/auth/oidc/callback
      OIDC_ALLOWED_HOSTS: idp.test
      OIDC_ALLOWED_REDIRECT_URIS: https://zephyrus.test/auth/oidc/callback
      INTEGRATION_ALLOWED_HOSTS: fhir.test
      EPIC_FHIR_BASE_URL: https://fhir.test/r4
      EPIC_SMART_CONFIGURATION_URL: https://fhir.test/.well-known/smart-configuration
      EPIC_FHIR_TOKEN_URL: https://fhir.test/oauth2/token
      EDDY_BASE_URL: http://eddy.test
      ARENA_BASE_URL: http://arena.test
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/backend-quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus -d zephyrus_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Verify Hummingbird capability and staff/patient contracts
        run: |
          php scripts/verify-hummingbird-capability-ledger.php
          php scripts/generate-hummingbird-capability-report.php --check
          php scripts/verify-hummingbird-staff-contract.php --self-test-governance
          php scripts/verify-hummingbird-staff-contract.php
          php scripts/verify-hummingbird-patient-disclosure-matrix.php
          php scripts/verify-hummingbird-patient-accessibility-matrix.php
          php scripts/verify-hummingbird-patient-contract.php
          php scripts/verify-hummingbird-contract-baseline.php
          php scripts/generate-hummingbird-route-inventory.php --check
          bash scripts/check-no-tracking-technologies.sh

      - name: Verify immutable release snapshots
        run: |
          bash tests/Deployment/immutable-release-snapshot.sh
          bash tests/Deployment/github-ci-gate.sh

      - name: Copy environment template
        run: cp .env.example .env

      - name: Prove test resource isolation
        run: php scripts/assert-test-environment.php

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run migrations
        run: bash scripts/capture-release-evidence.sh backend-migration php artisan migrate --force

      - name: Prove concurrent database isolation
        run: bash scripts/verify-test-isolation.sh --focused

      - name: Upload backend quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-release-evidence
          path: artifacts/release-evidence/backend-quality
          if-no-files-found: error
          retention-days: 30

  backend-tests:
    name: Backend tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      HUMMINGBIRD_PATIENT_CONTEXT_KEY: test-hummingbird-patient-context-key-v1
      APP_URL: http://zephyrus.test
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: zephyrus_test
      DB_USERNAME: zephyrus
      DB_PASSWORD: secret
      TEST_DB_ISOLATION: "true"
      TEST_DB_ADMIN_DATABASE: postgres
      TEST_NETWORK_GUARD: "true"
      INTEGRATION_SECRET_FILE_ROOT: storage/framework/testing/secrets
      OIDC_ENABLED: "false"
      OIDC_DISCOVERY_URL: https://idp.test/.well-known/openid-configuration
      OIDC_REDIRECT_URI: https://zephyrus.test/auth/oidc/callback
      OIDC_ALLOWED_HOSTS: idp.test
      OIDC_ALLOWED_REDIRECT_URIS: https://zephyrus.test/auth/oidc/callback
      INTEGRATION_ALLOWED_HOSTS: fhir.test
      EPIC_FHIR_BASE_URL: https://fhir.test/r4
      EPIC_SMART_CONFIGURATION_URL: https://fhir.test/.well-known/smart-configuration
      EPIC_FHIR_TOKEN_URL: https://fhir.test/oauth2/token
      EDDY_BASE_URL: http://eddy.test
      ARENA_BASE_URL: http://arena.test
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/backend-${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard:
          - unit
          - feature-0
          - feature-1
          - feature-2
          - feature-3
          - feature-4
          - feature-5
          - feature-6
          - feature-7

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus -d zephyrus_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment template
        run: cp .env.example .env

      - name: Prove test resource isolation
        run: php scripts/assert-test-environment.php

      - name: Run migrations
        run: bash scripts/capture-release-evidence.sh backend-migration php artisan migrate --force

      - name: Run PHPUnit shard
        run: bash scripts/capture-release-evidence.sh backend-phpunit-${{ matrix.shard }} scripts/ci/run-backend-test-shard.sh "${{ matrix.shard }}"

      - name: Upload backend shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.shard }}-release-evidence
          path: artifacts/release-evidence/backend-${{ matrix.shard }}
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript, Vitest, Vite build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Vitest / Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: bash scripts/capture-release-evidence.sh frontend-typescript npx tsc --noEmit

      - name: Run Vitest with coverage
        run: bash scripts/capture-release-evidence.sh frontend-vitest npx vitest run --coverage

      - name: Vite production build
        run: bash scripts/capture-release-evidence.sh frontend-build npx vite build

      - name: UI canon check
        run: bash scripts/capture-release-evidence.sh frontend-ui-canon bash scripts/check-ui-canon.sh

      - name: Upload frontend evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-evidence
          path: artifacts/release-evidence/frontend
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Security — dependency, secret, SAST, and edge-policy release gates
  # ---------------------------------------------------------------------------
  security:
    name: Security (dependencies / secrets / SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/security

    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks must inspect the complete repository history.
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned security tools
        run: bash scripts/security/install-tools.sh

      - name: Run security release gates
        run: bash scripts/capture-release-evidence.sh security-suite bash scripts/security/run-security-suite.sh

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-release-evidence
          path: artifacts/release-evidence/security
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Arena sidecar — OCPM pytest incl. the Part X (X4) PM-LLM-Benchmark copilot
  # eval harness (model-discovery quality via conformance-fitness). §X.8.4: a
  # copilot release that regresses model fitness does not ship.
  # ---------------------------------------------------------------------------
  arena:
    name: Arena sidecar (pytest / pm4py)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/arena

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: arena/requirements.txt

      - name: Install dependencies
        working-directory: arena
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run OCPM + copilot eval tests
        run: bash scripts/capture-release-evidence.sh arena-pytest bash -lc 'cd arena && python -m pytest tests -q'

      - name: Upload Arena evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arena-release-evidence
          path: artifacts/release-evidence/arena
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Browser — real login and protected-route interaction against a test-only DB
  # ---------------------------------------------------------------------------
  browser:
    name: Browser (Playwright / Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      HUMMINGBIRD_PATIENT_CONTEXT_KEY: test-hummingbird-patient-context-key-v1
      APP_URL: http://127.0.0.1:8084
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: zephyrus_test
      DB_USERNAME: zephyrus
      DB_PASSWORD: secret
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      SESSION_DRIVER: database
      LOCAL_AUTH_ENABLED: "true"
      LOCAL_REGISTRATION_ENABLED: "false"
      DEMO_AUTO_LOGIN_ENABLED: "false"
      TEST_USERNAME: e2e_admin
      TEST_PASSWORD: BrowserOnlyPassword!123
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8084
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/browser

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, zip
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install application and browser dependencies
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare test application
        run: cp .env.example .env

      - name: Run Playwright
        run: bash scripts/run-browser-suite.sh

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-release-evidence
          path: |
            artifacts/release-evidence/browser
            playwright-report
            test-results
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # DAST — passive ZAP scan against a disposable Laravel/database boundary
  # ---------------------------------------------------------------------------
  dast:
    name: DAST (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_ENV: testing
      APP_KEY: base64:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      HUMMINGBIRD_PATIENT_CONTEXT_KEY: test-hummingbird-patient-context-key-v1
      APP_URL: http://127.0.0.1:8085
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: zephyrus_test
      DB_USERNAME: zephyrus
      DB_PASSWORD: secret
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      BROADCAST_CONNECTION: log
      SESSION_DRIVER: database
      LOCAL_AUTH_ENABLED: "true"
      LOCAL_REGISTRATION_ENABLED: "false"
      DEMO_AUTO_LOGIN_ENABLED: "false"
      TEST_USERNAME: e2e_admin
      TEST_PASSWORD: BrowserOnlyPassword!123
      RELEASE_EVIDENCE_DIR: artifacts/release-evidence/dast

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, zip
          coverage: none

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install application dependencies
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          npm ci

      - name: Prepare test application
        run: cp .env.example .env

      - name: Run pinned ZAP baseline
        run: bash scripts/capture-release-evidence.sh dast-zap bash scripts/run-dast-suite.sh

      - name: Upload DAST evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-release-evidence
          path: artifacts/release-evidence/dast
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Hummingbird patient apps — independent product boundaries and native tests
  # ---------------------------------------------------------------------------
  hummingbird-patient-android:
    name: Hummingbird patient (Android)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: hummingbird/androidPatientApp

    steps:
      - uses: actions/checkout@v4

      # The emulator action relies on KVM for a bounded, stable x86_64 boot on
      # hosted Linux. Without device permissions, the API 35 cold boot can
      # take long enough for its post-boot ADB setup to fail.
      - name: Enable KVM acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12266719"
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          validate-wrappers: true

      - name: Verify patient source and Gradle product boundaries
        run: |
          bash ../../scripts/ci/verify-hummingbird-patient-boundary.sh source app/src
          ./gradlew --no-daemon --stacktrace verifyPatientProductBoundary

      - name: Run Debug and Release unit tests
        run: ./gradlew --no-daemon --stacktrace testDebugUnitTest testReleaseUnitTest

      - name: Run Debug and Release lint
        run: ./gradlew --no-daemon --stacktrace lintDebug lintRelease

      - name: Assemble Debug and Release apps
        run: ./gradlew --no-daemon --stacktrace assembleDebug assembleRelease

      - name: Verify patient Release APK boundary
        run: |
          mapfile -t release_apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" -print | sort)
          [[ "${#release_apks[@]}" -eq 1 ]] || {
            echo "Expected exactly one patient Release APK; found ${#release_apks[@]}" >&2
            exit 1
          }
          bash ../../scripts/ci/verify-hummingbird-patient-boundary.sh artifact "${release_apks[0]}"

      - name: Run Debug instrumented tests on Android 35
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          working-directory: hummingbird/androidPatientApp
          script: ./gradlew --no-daemon --stacktrace connectedDebugAndroidTest

      - name: Upload Android patient verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hummingbird-patient-android-verification
          path: |
            hummingbird/androidPatientApp/app/build/reports
            hummingbird/androidPatientApp/app/build/test-results
            hummingbird/androidPatientApp/app/build/outputs/androidTest-results
            hummingbird/androidPatientApp/app/build/outputs/apk/debug/app-debug.apk
            hummingbird/androidPatientApp/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14

  hummingbird-patient-ios:
    name: Hummingbird patient (iOS)
    runs-on: macos-15
    timeout-minutes: 40
    env:
      IOS_PATIENT_ROOT: hummingbird/iosPatientApp

    steps:
      - uses: actions/checkout@v4

      - name: Install pinned XcodeGen
        env:
          XCODEGEN_VERSION: 2.46.0
          XCODEGEN_SHA256: 4d9e34b62172d645eed6457cac13fc222569974098ef4ee9c3368bedf0196806
        run: |
          curl --fail --show-error --silent --location \
            --output "$RUNNER_TEMP/xcodegen.zip" \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          echo "${XCODEGEN_SHA256}  $RUNNER_TEMP/xcodegen.zip" | shasum -a 256 --check
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/xcodegen/bin/xcodegen" --version

      - name: Verify generated Xcode project and patient source boundary
        run: |
          bash scripts/ci/verify-hummingbird-patient-xcode-project.sh "$IOS_PATIENT_ROOT"
          bash scripts/ci/verify-hummingbird-patient-boundary.sh source "$IOS_PATIENT_ROOT"
          xcodebuild -project "$IOS_PATIENT_ROOT/HummingbirdPatient.xcodeproj" -list

      - name: Build Debug for iPhone Simulator
        run: |
          xcodebuild \
            -project "$IOS_PATIENT_ROOT/HummingbirdPatient.xcodeproj" \
            -scheme HummingbirdPatient \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/hummingbird-patient-ios-debug" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Build Release for iPhone Simulator
        run: |
          xcodebuild \
            -project "$IOS_PATIENT_ROOT/HummingbirdPatient.xcodeproj" \
            -scheme HummingbirdPatient \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/hummingbird-patient-ios-release" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Verify patient Release app boundary
        run: |
          release_app="$RUNNER_TEMP/hummingbird-patient-ios-release/Build/Products/Release-iphonesimulator/HummingbirdPatient.app"
          bash scripts/ci/verify-hummingbird-patient-boundary.sh artifact "$release_app"

      - name: Select and boot an available iPhone Simulator
        id: simulator
        run: |
          simulator_udid="$(bash scripts/ci/select-ios-simulator.sh)"
          echo "udid=$simulator_udid" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$simulator_udid" 2>/dev/null || true
          xcrun simctl bootstatus "$simulator_udid" -b

      - name: Run XCTest unit suite
        run: |
          xcodebuild \
            -project "$IOS_PATIENT_ROOT/HummingbirdPatient.xcodeproj" \
            -scheme HummingbirdPatient \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/hummingbird-patient-ios-tests" \
            -resultBundlePath "$RUNNER_TEMP/HummingbirdPatientUnitTests.xcresult" \
            -only-testing:HummingbirdPatientTests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Run XCUITest reference journeys
        run: |
          xcodebuild \
            -project "$IOS_PATIENT_ROOT/HummingbirdPatient.xcodeproj" \
            -scheme HummingbirdPatient \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/hummingbird-patient-ios-tests" \
            -resultBundlePath "$RUNNER_TEMP/HummingbirdPatientUITests.xcresult" \
            -only-testing:HummingbirdPatientUITests \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Shut down test simulator
        if: always() && steps.simulator.outputs.udid != ''
        run: xcrun simctl shutdown "${{ steps.simulator.outputs.udid }}" 2>/dev/null || true

      - name: Upload iOS patient verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hummingbird-patient-ios-verification
          path: |
            ${{ runner.temp }}/HummingbirdPatientUnitTests.xcresult
            ${{ runner.temp }}/HummingbirdPatientUITests.xcresult
            ${{ runner.temp }}/hummingbird-patient-ios-release/Build/Products/Release-iphonesimulator/HummingbirdPatient.app
          if-no-files-found: warn
          retention-days: 14
