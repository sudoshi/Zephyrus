name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Pint, PHPUnit, migrations
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip, dom, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy .env and generate key
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: test_pass
          CACHE_STORE: array
          SESSION_DRIVER: array

      - name: Run PHPUnit tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: test_pass
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  # ---------------------------------------------------------------------------
  # Frontend — Node/Vite build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node/Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy — SSH to production (main branch only, after CI passes)
  #
  # Required GitHub secrets:
  #   DEPLOY_HOST      — server hostname/IP
  #   DEPLOY_USER      — SSH user (should have passwordless sudo for specific
  #                      commands via /etc/sudoers.d/ — NOT a blanket password)
  #   DEPLOY_SSH_KEY   — PEM private key; public key in authorized_keys on server
  #   DEPLOY_DIR       — absolute path on server (e.g. /var/www/Zephyrus)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: production_deploy
      cancel-in-progress: false

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_DIR:  ${{ secrets.DEPLOY_DIR }}
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s << 'ENDSSH'
            set -e
            cd $DEPLOY_DIR
            git fetch origin main && git checkout main && git pull origin main
            composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache && php artisan route:cache && php artisan view:cache
            npm ci --omit=dev && npm run build
            php artisan queue:restart
            echo "Deploy complete $(date -u)"
          ENDSSH
