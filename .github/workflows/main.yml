name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Pint, PHPUnit, migrations
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zephyrus_test
          POSTGRES_USER: zephyrus
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U zephyrus"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_pgsql, pgsql, mbstring, exif, pcntl, bcmath, gd, zip, dom, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Verify immutable release snapshots
        run: bash tests/Deployment/immutable-release-snapshot.sh

      - name: Copy .env and generate key
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: test_pass
          CACHE_STORE: array
          SESSION_DRIVER: array

      - name: Run PHPUnit tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: zephyrus_test
          DB_USERNAME: zephyrus
          DB_PASSWORD: test_pass
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  # ---------------------------------------------------------------------------
  # Frontend — Node/Vite build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node/Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build
