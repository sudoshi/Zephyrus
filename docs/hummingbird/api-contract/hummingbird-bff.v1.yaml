openapi: 3.1.0
info:
  title: Hummingbird Mobile BFF
  version: 1.0.0-draft
  description: >
    The mobile Backend-for-Frontend for Hummingbird — the ONLY surface the native
    apps consume. Aggregates and reshapes the existing Zephyrus services for mobile:
    one screen → one call, uniform envelope, role-scoped, PHI-minimized, token-authed.
    Mutations DELEGATE to existing lifecycle services (no business logic re-implemented).
    This is a v1 DRAFT sketch covering the highest-value endpoints; it generates the
    Ktor client (shared KMP) and serves as the contract for the conformance test spec.
servers:
  - url: https://{host}/api/mobile/v1
    variables: { host: { default: zephyrus.example.org } }

security:
  - bearerAuth: []

tags:
  - { name: auth }
  - { name: me }
  - { name: altitude }
  - { name: for-you }
  - { name: rtdc }
  - { name: patients }
  - { name: patient-communications }
  - { name: activity }
  - { name: ops }
  - { name: or }
  - { name: command }
  - { name: transport }
  - { name: evs }
  - { name: staffing }
  - { name: improvement }
  - { name: realtime }
  - { name: eddy }

paths:
  /auth/token:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: staff_password
        required_abilities: []
      x-zephyrus-data-classification:
        request: staff_identity_secret
        response: staff_authentication_secret
        storage: protected_credential_store
      x-zephyrus-idempotency:
        semantics: non_idempotent
        idempotency_key: unsupported
        retry: never_automatic
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 413, 415, 422, 429, 500]
      tags: [auth]
      security: []
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Exchange credentials (or OIDC code) for tokens. Honors must_change_password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: "#/components/schemas/PasswordGrant" }
                - { $ref: "#/components/schemas/OidcCodeGrant" }
      responses:
        "200":
          description: Tokens issued (or a password-change challenge).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/TokenResponse" }
                  - { $ref: "#/components/schemas/PasswordChangeChallenge" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/token/refresh:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [token:refresh]
      x-zephyrus-data-classification:
        request: staff_authentication_secret
        response: staff_authentication_secret
        storage: protected_credential_store
      x-zephyrus-idempotency:
        semantics: non_idempotent_token_rotation
        idempotency_key: presented_refresh_token
        retry: never_concurrent_or_automatic
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 413, 415, 422, 429, 500]
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      security:
        - bearerAuth: []
      summary: Rotate refresh → new access token.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/TokenResponse" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/token/revoke:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: []
      x-zephyrus-data-classification:
        request: staff_authentication_secret
        response: content_free_confirmation
        storage: protected_credential_store
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: resource_or_presented_token_identity
        retry: explicit_retry_treating_already_absent_as_success
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 413, 415, 422, 429, 500]
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Revoke this device's tokens (logout / remote-wipe support).
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/change-password:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: []
      x-zephyrus-data-classification:
        request: staff_authentication_secret
        response: staff_authentication_secret
        storage: protected_credential_store
      x-zephyrus-idempotency:
        semantics: non_idempotent
        idempotency_key: unsupported
        retry: never_automatic
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 413, 415, 422, 429, 500]
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Forced/normal password change (mirrors the locked web flow; does not replace it).
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ChangePassword" } },
            },
        }
      responses:
        "200":
          {
            description: Changed; tokens issued,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/TokenResponse" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidBody" }

  /me:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: phi_minimized_operational
        storage: capability_ledger_offline_policy
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 429, 500]
      tags: [me]
      summary: Profile, role, workflow_preference, prefs.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/MeEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /me/preferences:
    put:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: phi_minimized_operational_command
        response: phi_minimized_operational_state
        storage: capability_ledger_offline_policy
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: resource_identity
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 413, 415, 422, 429, 500]
      tags: [me]
      summary: Notification tiers, quiet hours, theme, default workflow.
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/Preferences" } },
            },
        }
      responses:
        "200": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /devices:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: notification_device_secret
        response: opaque_device_registration
        storage: protected_device_registry
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: device_registration_identity
        retry: explicit_retry_after_authorized_refetch
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 413, 415, 422, 429, 500]
      tags: [me]
      summary: Register an APNs/FCM push token for this device.
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/DeviceRegistration" } },
            },
        }
      responses:
        "201": { description: Registered }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /devices/{device}:
    delete:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: notification_device_secret
        response: opaque_device_registration
        storage: protected_device_registry
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: resource_or_presented_token_identity
        retry: explicit_retry_treating_already_absent_as_success
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      tags: [me]
      summary: Revoke a registered mobile device token.
      parameters:
        [{ name: device, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          {
            description: Revoked,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /altitude/home:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: phi_minimized_operational
        storage: capability_ledger_offline_policy
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 429, 500]
      tags: [altitude]
      summary: A0 Persona Glance composed from the shared operational snapshot.
      parameters:
        [
          {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
            description: Confirmed shift role; defaults from the token/user when absent.,
          },
        ]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeHomeEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /altitude/workspace/{domain}:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: phi_minimized_operational
        storage: capability_ledger_offline_policy
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      tags: [altitude]
      summary: A1 Live Workspace for a domain queue or board.
      parameters:
        - {
            name: domain,
            in: path,
            required: true,
            schema:
              {
                type: string,
                enum:
                  [rtdc, capacity, transport, evs, staffing, ops, approvals],
              },
          }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeWorkspaceEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /drills/{itemUuid}:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: phi_minimized_operational
        storage: capability_ledger_offline_policy
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      tags: [altitude]
      summary: A2 drill for a For You item, alert, queue row, or operational event.
      parameters:
        - { name: itemUuid, in: path, required: true, schema: { type: string } }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeDrillEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /patients/{contextRef}/operational-context:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_patient_context_reference
        response: staff_authorized_patient_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      tags: [patients]
      summary: A2P Patient/Encounter Lens for authorized operational detail entry.
      parameters:
        - {
            name: contextRef,
            in: path,
            required: true,
            schema: { type: string },
            description: Opaque patient_context_ref issued by A2 drill/list surfaces. Raw patient identifiers are rejected.,
          }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/PatientOperationalContextEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /patient-communications/inbox:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: patient_communication_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500, 503]
      tags: [patient-communications]
      summary: List open patient-message work items for the staff member's active responsibility-pool memberships.
      description: >
        Returns at most 200 open work items ordered by escalation state and response target.
        The response contains restricted patient-communication context and must not be cached
        offline. Capability alone is insufficient: the caller must also have an effective
        membership in the work item's active responsibility pool.
      x-authorization-capability:
        enum_case: ViewPatientCommunications
        gate: viewPatientCommunications
      x-data-classification: phi
      x-offline-class: NO_CACHE
      x-idempotency: NOT_APPLICABLE
      responses:
        "200":
          description: Eligible open work items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCommunicationInboxEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /patient-communications/threads/{workItemUuid}:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: patient_communication_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500, 503]
      tags: [patient-communications]
      summary: Read one authorized patient-message work item and its bounded message history.
      description: >
        Returns the newest 250 canonical encrypted-ledger messages in chronological display
        order after server-side decryption. A generic not-found response hides absent resources,
        missing pool membership, and unauthorized work items.
      x-authorization-capability:
        enum_case: ViewPatientCommunications
        gate: viewPatientCommunications
      x-data-classification: phi
      x-offline-class: NO_CACHE
      x-idempotency: NOT_APPLICABLE
      parameters:
        - $ref: "#/components/parameters/PatientCommunicationWorkItemUuid"
      responses:
        "200":
          description: Authorized work item and message history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCommunicationThreadEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /patient-communications/threads/{workItemUuid}/route-candidates:
    get:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read, mobile:act]
      x-zephyrus-data-classification:
        request: opaque_resource_reference_or_filter
        response: patient_communication_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe_read
        idempotency_key: not_applicable
        retry: automatic_once_after_successful_auth_refresh
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 409, 429, 500, 503]
      tags: [patient-communications]
      summary: List the currently authorized release, reassign, and reroute choices for one work item.
      description: >
        Returns only bounded server-resolved targets using opaque membership and pool UUIDs.
        Candidate resolution is content-free and rechecks the caller's response capability,
        effective source-pool membership, source-pool integrity, approved routing policy and topic,
        governed encounter scope, active target membership, and target responder capability. The
        client must use the returned versions and one returned target UUID; it must never guess or
        synthesize a routing target.
      x-authorization-capability:
        enum_case: RespondPatientCommunications
        gate: respondPatientCommunications
      x-data-classification: phi
      x-offline-class: NO_CACHE
      x-idempotency: NOT_APPLICABLE
      parameters:
        - $ref: "#/components/parameters/PatientCommunicationWorkItemUuid"
      responses:
        "200":
          description: Current content-free routing actions, reasons, and eligible target candidates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCommunicationRouteCandidatesEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /patient-communications/threads/{workItemUuid}/claim:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read, mobile:act]
      x-zephyrus-data-classification:
        request: patient_communication_phi
        response: patient_communication_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: exact_replay
        idempotency_key: idempotency_key_header
        retry: explicit_same_key_and_payload_only
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 409, 413, 415, 422, 429, 500, 503]
      tags: [patient-communications]
      summary: Atomically claim an unassigned patient-message work item.
      description: >
        Requires an effective pool membership with claim permission. Both projection versions
        are required for optimistic concurrency. Reusing the same UUID idempotency key with the
        same payload returns the original logical result; binding it to another operation or
        payload returns a conflict. Clients must re-fetch after conflicts and must not queue this
        PHI-bearing command for offline delivery.
      x-authorization-capability:
        enum_case: RespondPatientCommunications
        gate: respondPatientCommunications
      x-data-classification: phi
      x-offline-class: NO_CACHE
      x-idempotency: REQUIRED_UUID_HEADER
      parameters:
        - $ref: "#/components/parameters/PatientCommunicationWorkItemUuid"
        - $ref: "#/components/parameters/PatientCommunicationIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimPatientCommunication"
      responses:
        "200":
          description: Work item claimed or an exact replay returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientCommunicationMutationEnvelope"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/InvalidBody" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }
  /patient-communications/threads/{workItemUuid}/reply:
    post:
      x-zephyrus-authorization:
        realm: staff
        authentication: bearer
        required_abilities: [mobile:read, mobile:act]
      x-zephyrus-data-classification:
        request: patient_communication_phi
        response: patient_communication_phi
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: exact_replay
        idempotency_key: idempotency_key_header
        retry: explicit_same_key_and_payload_only
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 409, 413, 415, 422, 429, 500, 503]
      tags: [patient-communications]
      summary: Append a patient-visible care-team reply to a claimed work item.
      description: >
        Requires an effective pool membership with reply permission and assignment to the caller.
        The message is stored only in the canonical patient message ledger using the dedicated
