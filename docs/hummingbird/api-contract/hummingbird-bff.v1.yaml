        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
        "503":
          description: Eddy unreachable. envelope.meta.stale=true; data.message is a notice string.
  /eddy/chat/stream:
