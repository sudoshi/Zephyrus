        idempotency_key: unsupported
        retry: never_automatic
      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 413, 415, 422, 429, 500, 503]
      tags: [eddy]
      summary: Send a turn to Eddy. Stateless service; Laravel persists the conversation (origin=hummingbird).
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/EddyChatRequest" } },
