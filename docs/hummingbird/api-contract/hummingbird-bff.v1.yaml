components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: Sanctum-PAT }

  parameters:
    PatientCommunicationWorkItemUuid:
      name: workItemUuid
      in: path
      required: true
      description: Opaque UUID of the staff work projection, never a patient identifier.
      schema: { type: string, format: uuid }
    PatientCommunicationIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >
        Client-generated canonical lowercase UUID bound to the authenticated staff actor,
        operation, work item, and validated payload. Reuse only for an exact retry of the
        same command.
      schema:
        {
          type: string,
          format: uuid,
          pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$",
        }

  responses:
    Unauthorized:
      {
        description: Missing/invalid token.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    Forbidden:
      {
        description: Token is valid but lacks the required ability or persona.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    NotFound:
      {
        description: Entity or detail was not found.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    Conflict:
      description: State changed since load (optimistic-concurrency / illegal transition). Client should re-fetch and surface "changed since you loaded".
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    InvalidBody:
      {
        description: Request body failed validation.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    ServiceUnavailable:
      {
        description: The governed patient-communications workflow is disabled or temporarily unavailable.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }

  schemas:
    # ---- Uniform envelope ----
    Meta:
      type: object
      properties:
        as_of:
          {
            type: string,
            format: date-time,
            description: When this data was current.,
          }
        stale:
          {
            type: boolean,
            description: True if served from a degraded/cached path.,
          }
        version:
          {
            oneOf: [{ type: string }, { type: "null" }],
            description: ETag/version for optimistic concurrency.,
          }
        count: { type: integer, minimum: 0 }
        per_page: { type: integer, minimum: 1, maximum: 100 }
        has_more: { type: boolean }
        next_cursor: { oneOf: [{ type: string }, { type: "null" }] }
        previous_cursor: { oneOf: [{ type: string }, { type: "null" }] }
      required: [as_of, stale, version]
    Links:
      type: object
      properties:
        {
          web:
            {
              type: string,
              format: uri,
              description: Deep link to the equivalent web surface.,
            },
        }
    Envelope:
      type: object
      properties:
        data: {}
        meta: { $ref: "#/components/schemas/Meta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationRestrictedMeta:
      allOf:
        - $ref: "#/components/schemas/Meta"
        - type: object
          properties:
            classification:
              type: string
              const: patient_communication_restricted
            offline_writes_allowed:
              type: boolean
              const: false
          required: [classification, offline_writes_allowed]
    PatientCommunicationTopic:
      type: object
      additionalProperties: false
      properties:
        code: { type: string, pattern: "^[a-z][a-z0-9_]{1,78}[a-z0-9]$" }
        label: { type: string, minLength: 1, maxLength: 120 }
      required: [code, label]
    PatientCommunicationUnit:
      type: object
      additionalProperties: false
      properties:
        id: { type: integer, minimum: 1 }
        label: { type: string, minLength: 1 }
      required: [id, label]
    PatientCommunicationPool:
      type: object
      additionalProperties: false
      properties:
        pool_uuid: { type: string, format: uuid }
        label: { type: string, minLength: 1, maxLength: 120 }
      required: [pool_uuid, label]
    PatientCommunicationRoutingActions:
      type: object
      additionalProperties: false
      properties:
        can_release: { type: boolean }
        can_reassign: { type: boolean }
        can_reroute: { type: boolean }
      required: [can_release, can_reassign, can_reroute]
    PatientCommunicationReleaseReasonOption:
      type: object
      additionalProperties: false
      properties:
        code:
          {
            type: string,
            enum:
              [
                return_to_team,
                shift_handoff,
                responder_unavailable,
                incorrect_assignment,
              ],
          }
        label: { type: string, minLength: 1, maxLength: 120 }
      required: [code, label]
    PatientCommunicationReassignReasonOption:
      type: object
      additionalProperties: false
      properties:
        code:
          {
            type: string,
            enum:
              [
                supervisor_assignment,
                shift_handoff,
                coverage_change,
                workload_balance,
              ],
          }
        label: { type: string, minLength: 1, maxLength: 120 }
      required: [code, label]
    PatientCommunicationRerouteReasonOption:
      type: object
      additionalProperties: false
      properties:
        code:
          {
            type: string,
            enum: [wrong_team, unit_transfer, service_change, specialty_needed],
          }
        label: { type: string, minLength: 1, maxLength: 120 }
      required: [code, label]
    PatientCommunicationRoutingReasonOptions:
      type: object
      additionalProperties: false
      properties:
        release:
          type: array
          minItems: 1
          maxItems: 12
          items:
            {
              $ref: "#/components/schemas/PatientCommunicationReleaseReasonOption",
            }
        reassign:
          type: array
          minItems: 1
          maxItems: 12
          items:
            {
              $ref: "#/components/schemas/PatientCommunicationReassignReasonOption",
            }
        reroute:
          type: array
          minItems: 1
          maxItems: 12
          items:
            {
              $ref: "#/components/schemas/PatientCommunicationRerouteReasonOption",
            }
      required: [release, reassign, reroute]
    PatientCommunicationReassignCandidate:
      type: object
      additionalProperties: false
      properties:
        membership_uuid: { type: string, format: uuid }
        label: { type: string, minLength: 1, maxLength: 120 }
        membership_role: { type: string, enum: [responder, triage, supervisor] }
      required: [membership_uuid, label, membership_role]
    PatientCommunicationRerouteCandidate:
      type: object
      additionalProperties: false
      properties:
        pool_uuid: { type: string, format: uuid }
        label: { type: string, minLength: 1, maxLength: 120 }
        scope_type: { type: string, enum: [unit, facility, enterprise] }
        unit:
          oneOf:
            - $ref: "#/components/schemas/PatientCommunicationUnit"
            - { type: "null" }
      required: [pool_uuid, label, scope_type, unit]
    PatientCommunicationRouteCandidatesData:
      type: object
      additionalProperties: false
      properties:
        work_item_uuid: { type: string, format: uuid }
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        actions:
          { $ref: "#/components/schemas/PatientCommunicationRoutingActions" }
        reason_options:
          {
            $ref: "#/components/schemas/PatientCommunicationRoutingReasonOptions",
          }
        reassign_candidates:
          type: array
          maxItems: 50
          items:
            {
              $ref: "#/components/schemas/PatientCommunicationReassignCandidate",
            }
        reroute_candidates:
          type: array
          maxItems: 50
          items:
            {
              $ref: "#/components/schemas/PatientCommunicationRerouteCandidate",
            }
      required:
        [
          work_item_uuid,
          work_item_version,
          thread_version,
          actions,
          reason_options,
          reassign_candidates,
          reroute_candidates,
        ]
    PatientCommunicationMessage:
      type: object
      additionalProperties: false
      properties:
        message_uuid: { type: string, format: uuid }
        sender_display_role:
          {
            type: string,
            enum:
              [
                Patient,
                Representative,
                Care team,
                Care team — internal,
                System,
              ],
          }
        visibility: { type: string, enum: [patient_visible, staff_internal] }
        message_kind:
          {
            type: string,
            enum: [message, correction, retraction, system_status],
          }
        body:
          oneOf:
            - { type: string, minLength: 1, maxLength: 4000 }
            - { type: "null" }
        delivery_state:
          {
            type: string,
            enum:
              [
                sent,
                accepted,
                routed,
                assigned,
                acknowledged,
                delivered,
                responded,
                closed,
              ],
          }
        sent_at:
          oneOf:
            - { type: string, format: date-time }
            - { type: "null" }
      required:
        [
          message_uuid,
          sender_display_role,
          visibility,
          message_kind,
          body,
          delivery_state,
          sent_at,
        ]
    PatientCommunicationWorkItem:
      type: object
      additionalProperties: false
      properties:
        work_item_uuid: { type: string, format: uuid }
        thread_uuid: { type: string, format: uuid }
        patient_context_ref:
          oneOf: [{ type: string, minLength: 1 }, { type: "null" }]
        topic: { $ref: "#/components/schemas/PatientCommunicationTopic" }
        unit:
          oneOf:
            - $ref: "#/components/schemas/PatientCommunicationUnit"
            - { type: "null" }
        pool: { $ref: "#/components/schemas/PatientCommunicationPool" }
        status: { type: string, enum: [open, closed] }
        ownership_state:
          {
            type: string,
            enum:
              [
                pool_owned,
                assigned,
                acknowledged,
                responded,
                rerouted,
                escalated,
                closed,
              ],
          }
        assigned_to_me: { type: boolean }
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        last_message_at: { type: string, format: date-time }
        due_at: { type: string, format: date-time }
        escalate_at: { type: string, format: date-time }
        is_response_due: { type: boolean }
        is_escalation_due: { type: boolean }
        closed_at:
          oneOf:
            - { type: string, format: date-time }
            - { type: "null" }
        messages:
          type: array
          maxItems: 250
          items: { $ref: "#/components/schemas/PatientCommunicationMessage" }
        has_earlier_messages: { type: boolean }
      required:
        [
          work_item_uuid,
          thread_uuid,
          patient_context_ref,
          topic,
          unit,
          pool,
          status,
          ownership_state,
          assigned_to_me,
          work_item_version,
          thread_version,
          last_message_at,
          due_at,
          escalate_at,
          is_response_due,
          is_escalation_due,
          closed_at,
        ]
    PatientCommunicationThreadDetail:
      allOf:
        - $ref: "#/components/schemas/PatientCommunicationWorkItem"
        - type: object
          required: [messages, has_earlier_messages]
    PatientCommunicationInboxData:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/PatientCommunicationWorkItem" }
        count: { type: integer, minimum: 0, maximum: 200 }
      required: [items, count]
    PatientCommunicationMutationData:
      type: object
      additionalProperties: false
      properties:
        work_item: { $ref: "#/components/schemas/PatientCommunicationWorkItem" }
        message:
          oneOf:
            - $ref: "#/components/schemas/PatientCommunicationMessage"
            - { type: "null" }
        event_uuid:
          oneOf:
            - { type: string, format: uuid }
            - { type: "null" }
        replayed: { type: boolean }
      required: [work_item, message, event_uuid, replayed]
    PatientCommunicationRerouteCommittedData:
      type: object
      additionalProperties: false
      description: The current projection returned only by the first committed reroute request.
      properties:
        work_item: { $ref: "#/components/schemas/PatientCommunicationWorkItem" }
        message: { type: "null" }
        event_uuid: { type: string, format: uuid }
        replayed: { type: boolean, const: false }
      required: [work_item, message, event_uuid, replayed]
    PatientCommunicationRerouteReplayReceipt:
      type: object
      additionalProperties: false
      description: >
        Content-minimized immutable acknowledgement for an exact committed reroute replay. Null
        projection fields are intentional: clients must purge stale detail after the reroute and
        perform a separately authorized fresh GET if they need current state instead of treating a
        retry as a state query.
      properties:
        work_item: { type: "null" }
        message: { type: "null" }
        event_uuid: { type: string, format: uuid }
        replayed: { type: boolean, const: true }
      required: [work_item, message, event_uuid, replayed]
    PatientCommunicationRerouteMutationData:
      oneOf:
        - $ref: "#/components/schemas/PatientCommunicationRerouteCommittedData"
        - $ref: "#/components/schemas/PatientCommunicationRerouteReplayReceipt"
    PatientCommunicationWebRestrictedMeta:
      type: object
      additionalProperties: false
      properties:
        as_of: { type: string, format: date-time }
        classification:
          { type: string, const: patient_communication_restricted }
        offline_writes_allowed: { type: boolean, const: false }
      required: [as_of, classification, offline_writes_allowed]
    PatientCommunicationInboxEnvelope:
      type: object
      additionalProperties: false
      properties:
        data: { $ref: "#/components/schemas/PatientCommunicationInboxData" }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationRestrictedMeta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationThreadEnvelope:
      type: object
      additionalProperties: false
      properties:
        data: { $ref: "#/components/schemas/PatientCommunicationThreadDetail" }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationRestrictedMeta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationRouteCandidatesEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          {
            $ref: "#/components/schemas/PatientCommunicationRouteCandidatesData",
          }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationRestrictedMeta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationMutationEnvelope:
      type: object
      additionalProperties: false
      properties:
        data: { $ref: "#/components/schemas/PatientCommunicationMutationData" }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationRestrictedMeta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationRerouteMutationEnvelope:
      type: object
      additionalProperties: false
      properties:
        data:
          {
            $ref: "#/components/schemas/PatientCommunicationRerouteMutationData",
          }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationRestrictedMeta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    PatientCommunicationWebRerouteMutationEnvelope:
      type: object
      additionalProperties: false
      description: >
        Authenticated Zephyrus web counterpart. It uses the same fresh-or-minimal-replay data union
        as mobile but omits the mobile-only links object.
      properties:
        data:
          {
            $ref: "#/components/schemas/PatientCommunicationRerouteMutationData",
          }
        meta:
          { $ref: "#/components/schemas/PatientCommunicationWebRestrictedMeta" }
      required: [data, meta]
    ClaimPatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
      required: [work_item_version, thread_version]
    ReplyPatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        message: { type: string, minLength: 1, maxLength: 4000 }
        client_message_uuid: { type: string, format: uuid }
      required:
        [work_item_version, thread_version, message, client_message_uuid]
    ClosePatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        reason_code:
          {
            type: string,
            enum:
              [
                question_answered,
                duplicate,
                transferred,
                patient_requested,
                other,
              ],
          }
      required: [work_item_version, thread_version, reason_code]
    ReleasePatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        reason_code:
          {
            type: string,
            enum:
              [
                return_to_team,
                shift_handoff,
                responder_unavailable,
                incorrect_assignment,
              ],
          }
      required: [work_item_version, thread_version, reason_code]
    ReassignPatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        target_membership_uuid:
          {
            type: string,
            format: uuid,
            pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$",
          }
        reason_code:
          {
            type: string,
            enum:
              [
                supervisor_assignment,
                shift_handoff,
                coverage_change,
                workload_balance,
              ],
          }
      required:
        [work_item_version, thread_version, target_membership_uuid, reason_code]
    ReroutePatientCommunication:
      type: object
      additionalProperties: false
      properties:
        work_item_version: { type: integer, minimum: 1 }
        thread_version: { type: integer, minimum: 1 }
        target_pool_uuid:
          {
            type: string,
            format: uuid,
            pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$",
          }
        reason_code:
          {
            type: string,
            enum: [wrong_team, unit_transfer, service_change, specialty_needed],
          }
      required:
        [work_item_version, thread_version, target_pool_uuid, reason_code]
    Error:
      type: object
      properties:
        error:
          {
            type: object,
            properties:
              {
                code: { type: string },
                message: { type: string },
                retryable: { type: boolean },
              },
            required: [code, message],
          }
      required: [error]

    # ---- Auth ----
    PasswordGrant:
      {
        type: object,
        properties:
          {
            grant_type: { type: string, const: password },
            username: { type: string },
            password: { type: string },
            device: { $ref: "#/components/schemas/DeviceRegistration" },
          },
        required: [grant_type, username, password],
      }
    OidcCodeGrant:
      {
        type: object,
        properties:
          {
            grant_type: { type: string, const: oidc_code },
            code: { type: string },
            code_verifier: { type: string },
            redirect_uri: { type: string },
          },
        required: [grant_type, code, code_verifier],
      }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_in:
          { type: integer, description: Access-token lifetime (seconds). }
        abilities:
          {
            type: array,
            items: { type: string },
            description: Token scopes matching the user's role.,
          }
      required: [access_token, refresh_token, token_type, expires_in]
    PasswordChangeChallenge:
      type: object
      description: Returned when must_change_password is true. Scoped token is valid ONLY for /auth/change-password.
      properties:
        {
          password_change_required: { type: boolean, const: true },
          change_token: { type: string },
        }
      required: [password_change_required, change_token]
    ChangePassword:
      {
        type: object,
        properties:
          {
            current_password: { type: string },
            new_password: { type: string, minLength: 8 },
          },
        required: [new_password],
      }

    # ---- Me / prefs / devices ----
    Workflow:
      {
        type: string,
        enum:
          [superuser, rtdc, perioperative, emergency, improvement, transport],
      }
    MobilePersonaId:
      type: string
      enum:
        [
          charge_nurse,
          bedside_nurse,
          bed_manager,
          house_supervisor,
          hospitalist,
          intensivist,
          evs,
          transport,
          or_nurse,
          capacity_lead,
          periop_manager,
          staffing_coordinator,
          pi_lead,
          executive,
        ]
    StatusValue:
      type: string
      enum: [success, warning, critical, info]
    OperationalStatus:
      type: object
      properties:
        value: { $ref: "#/components/schemas/StatusValue" }
        glyph: { type: string, enum: [check, triangle, octagon, circle] }
        label: { type: string }
        generated_at: { type: string, format: date-time }
      required: [value, label, generated_at]
    MobilePersona:
      type: object
      properties:
        role_id: { $ref: "#/components/schemas/MobilePersonaId" }
        title: { type: string }
        assignment_scope: { type: string, enum: [unit, house] }
        home: { type: string }
        focus: { type: string }
        question: { type: string }
      required: [role_id, title, assignment_scope]
    MeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              additionalProperties: false
              properties:
                id: { type: integer, minimum: 1 }
                name: { type: string }
                username: { type: string }
                email:
                  oneOf: [{ type: string, format: email }, { type: "null" }]
                roles: { type: array, items: { type: string } }
                is_admin: { type: boolean }
                can:
                  type: object
                  additionalProperties: false
                  properties:
                    view_patient_communications: { type: boolean }
                    respond_patient_communications: { type: boolean }
                  required:
                    [
                      view_patient_communications,
                      respond_patient_communications,
                    ]
                workflow_preference:
                  oneOf:
                    - { $ref: "#/components/schemas/Workflow" }
                    - { type: "null" }
                must_change_password: { type: boolean }
                units:
                  type: array
                  description: Units this user is associated with (from user_unit).
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      unit_id: { type: integer, minimum: 1 }
                      name: { type: string }
                      role:
                        oneOf: [{ type: string }, { type: "null" }]
                      is_primary: { type: boolean }
                    required: [unit_id, name, role, is_primary]
              required:
                [
                  id,
                  name,
                  username,
                  email,
                  roles,
                  is_admin,
                  can,
                  workflow_preference,
                  must_change_password,
                  units,
                ]
    Preferences:
      type: object
      properties:
        default_workflow: { $ref: "#/components/schemas/Workflow" }
        theme: { type: string, enum: [dark, light, system], default: dark }
        notification_tiers:
          {
            type: object,
            additionalProperties: { type: boolean },
            description: Per-tier opt-in (T1 discouraged off).,
          }
        quiet_hours:
          {
            type: object,
            properties:
              {
                start: { type: string },
                end: { type: string },
                tz: { type: string },
              },
          }
    DeviceRegistration:
      type: object
      properties:
        platform: { type: string, enum: [ios, android] }
        push_token: { type: string }
        app_version: { type: string }
        locale: { type: string }
      required: [platform, push_token]

    # ---- Home / For-You ----
    HomeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                workflow: { $ref: "#/components/schemas/Workflow" }
                tiles:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/KpiTile" },
                  }
                for_you_head:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/ForYouItem" },
                    description: Top N For-You items inline.,
                  }
    KpiTile:
      type: object
      description: A glanceable metric. status is ALWAYS paired with a trend/label (never color alone).
      properties:
        key: { type: string }
        label: { type: string, description: UPPERCASE functional label. }
        value: { type: string, description: "Pre-formatted, tabular." }
        status: { $ref: "#/components/schemas/StatusValue" }
        trend: { type: string, enum: [up, down, flat] }
        target: { type: string }
        trust:
          { type: string, description: Provenance/source-trust badge text. }
        deep_link: { type: string, format: uri }
      required: [key, label, value, status]
    ForYouItem:
      type: object
      description: One actionable/awareness item, PHI-minimized. The inline primary action is the common response.
      properties:
        id: { type: string }
        type:
          type: string
          description: Server item class, for example bed_request, barrier, capacity, transport, evs, or patient_communication.
        altitude: { type: string, enum: [A2] }
        domain:
          {
            type: string,
            enum:
              [
                rtdc,
                ops,
                or,
                transport,
                evs,
                staffing,
                improvement,
                command,
                communications,
              ],
          }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        title: { type: string, description: PHI-free. }
        subtitle: { type: string }
        unit: { oneOf: [{ type: string }, { type: "null" }] }
        at: { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        status: { $ref: "#/components/schemas/StatusValue" }
        status_detail: { $ref: "#/components/schemas/OperationalStatus" }
        primary_action: { $ref: "#/components/schemas/Action" }
        recommended_actions:
          { type: array, items: { $ref: "#/components/schemas/Action" } }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        provenance: { type: object, additionalProperties: true }
        deep_link: { type: string, format: uri }
      required: [id, domain, visual_status, tier, title]
    Action:
      type: object
      properties:
        kind:
          {
            type: string,
            enum:
              [
                approve,
                reject,
                claim,
                start,
                complete,
                resolve,
                acknowledge,
                place,
                view,
                progress_transport,
                progress_turn,
              ],
          }
        label: { type: string }
        endpoint:
          {
            type: string,
            description: BFF path to POST when invoked (also usable from a notification action).,
          }
        method: { type: string, default: POST }
        requires_online: { type: boolean, default: true }
      required: [kind]
    ForYouEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            meta: { $ref: "#/components/schemas/ForYouRestrictedMeta" }
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ForYouItem" },
              }
            next_cursor: { type: string }
    ForYouRestrictedMeta:
      allOf:
        - $ref: "#/components/schemas/Meta"
        - type: object
          properties:
            classification:
              type: string
              const: phi_minimized_restricted
            offline_cache_allowed:
              type: boolean
              const: false
          required: [classification, offline_cache_allowed]

    MobileAltitudeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                altitude: { type: string, enum: [A0, A1, A2, A2P, A3] }
                persona: { $ref: "#/components/schemas/MobilePersona" }
                status: { $ref: "#/components/schemas/OperationalStatus" }
                generated_at: { type: string, format: date-time }
                patient_context_ref:
                  { oneOf: [{ type: string }, { type: "null" }] }
                provenance: { type: object, additionalProperties: true }
                dependencies:
                  {
                    type: array,
                    items: { type: object, additionalProperties: true },
                  }
                activity:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/ActivityEvent" },
                  }
              required: [altitude, persona, generated_at]
    MobileAltitudeHomeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeHome" }
    MobileAltitudeHome:
      type: object
      properties:
        altitude: { type: string, const: A0 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        generated_at: { type: string, format: date-time }
        glance_question: { type: string }
        tiles: { type: array, items: { $ref: "#/components/schemas/KpiTile" } }
        for_you_head:
          { type: array, items: { $ref: "#/components/schemas/ForYouItem" } }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        subscriptions: { type: object, additionalProperties: true }
        web: { type: object, additionalProperties: true }
      required:
        [altitude, persona, status, generated_at, glance_question, tiles]
    MobileAltitudeWorkspaceEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeWorkspace" }
    MobileAltitudeWorkspace:
      type: object
      properties:
        altitude: { type: string, const: A1 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        domain: { type: string }
        generated_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        workspace:
          type: object
          properties:
            summary:
              {
                type: object,
                properties:
                  { label: { type: string }, count: { type: integer } },
              }
            items:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        web: { type: object, additionalProperties: true }
      required: [altitude, persona, domain, generated_at, status, workspace]
    MobileAltitudeDrillEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeDrill" }
    MobileAltitudeDrill:
      type: object
      properties:
        altitude: { type: string, const: A2 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        item_uuid: { type: string }
        domain: { type: string }
        generated_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        explanation: { type: string }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        actions: { type: array, items: { $ref: "#/components/schemas/Action" } }
        web: { type: object, additionalProperties: true }
      required:
        [
          altitude,
          persona,
          item_uuid,
          generated_at,
          domain,
          status,
          explanation,
        ]
    PatientOperationalContextEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PatientOperationalContext" }
    PatientOperationalContext:
      type: object
      properties:
        altitude: { type: string, const: A2P }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        patient:
          {
            type: object,
            properties:
              {
                patient_context_ref: { type: string },
                display: { type: string },
                detail_authorized: { type: boolean },
                phi_minimized: { type: boolean },
              },
          }
        header: { type: object, additionalProperties: true }
        status_spine:
          { type: array, items: { type: object, additionalProperties: true } }
        timeline:
          { type: array, items: { type: object, additionalProperties: true } }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        recommendations:
          { type: array, items: { type: object, additionalProperties: true } }
        actions: { type: array, items: { $ref: "#/components/schemas/Action" } }
        relay: { type: object, additionalProperties: true }
        web: { type: object, additionalProperties: true }
        phi_policy: { type: object, additionalProperties: true }
      required:
        [
          altitude,
          persona,
          patient,
          header,
          status_spine,
          timeline,
          dependencies,
          phi_policy,
        ]
    ActivityEvent:
      type: object
      properties:
        event_uuid: { type: string, format: uuid }
        event_type: { type: string }
        occurred_at: { type: string, format: date-time }
        actor_user_id: { oneOf: [{ type: integer }, { type: "null" }] }
        actor_role: { oneOf: [{ type: string }, { type: "null" }] }
        source_surface: { type: string }
        domain: { type: string }
        scope: { type: object, additionalProperties: true }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        status: { type: object, additionalProperties: true }
        recommendation: { type: object, additionalProperties: true }
        relay: { type: object, additionalProperties: true }
        phi_policy: { type: object, additionalProperties: true }
      required: [event_uuid, event_type, occurred_at, domain]
    ActivityFeedEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ActivityEvent" },
              }
    EddyContextEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EddyContextPacket" }
    EddyContextPacket:
      type: object
      properties:
        scope_ref: { type: string }
        scope_type: { type: string }
        generated_at: { type: string, format: date-time }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        phi_policy: { type: object, additionalProperties: true }
        context:
          {
            type: object,
            additionalProperties: true,
            description: "Event/patient/activity context; authorized house/floor flow scopes may include patient_flow_4d with aggregate-safe current_metrics, top_barriers, redaction, lineage, and action_allowlist.",
          }
        questions_supported: { type: array, items: { type: string } }
      required:
        [scope_ref, scope_type, generated_at, persona, phi_policy, context]

    # ---- RTDC ----
    CensusUnit:
      type: object
      properties:
        unit_id: { type: integer }
        name: { type: string }
        type: { type: string }
        staffed_bed_count: { type: integer }
        occupied: { type: integer }
        available: { type: integer }
        blocked: { type: integer }
        can_admit:
          {
            type: integer,
            description: Acuity-adjusted beds that can be safely admitted now.,
          }
        bed_need: { type: integer, description: ">0 = deficit." }
        status: { $ref: "#/components/schemas/StatusValue" }
      required:
        [
          unit_id,
          name,
          staffed_bed_count,
          occupied,
          available,
          blocked,
          can_admit,
          bed_need,
          status,
        ]
    # ------------------------------------------------------------------
    # Flow Window (FLOW-WINDOW-PLAN) — the persona-lensed 48h surface
    # ------------------------------------------------------------------

    FlowPlate:
      type: object
      description: One simplified plan-view shape (feet; rect = [x, y, w, h]).
      required: [id, code, category, label, rect]
      properties:
        id: { type: integer, description: facility_space_id }
        code: { type: string }
        category:
          {
            type: string,
            enum:
              [
                zone,
                unit,
                room,
                bay,
                bed,
                corridor,
                vertical_transport,
                procedure_room,
                imaging,
              ],
          }
        label: { type: string }
        rect: { type: array, items: { type: number }, minItems: 4, maxItems: 4 }
        unit_id: { type: integer }
        bed_id: { type: integer }

    FlowFloorsEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [version, facility, floors]
              properties:
                version: { type: string }
                units:
                  { type: string, description: Geometry unit contract note. }
                facility:
                  type: object
                  properties:
                    code: { type: string }
                    cad_code: { type: string }
                    name: { type: string }
                floors:
                  type: array
                  items:
                    type: object
                    required: [floor, label, bounds, spaces]
                    properties:
                      floor: { type: integer }
                      label: { type: string }
                      bounds:
                        {
                          type: array,
                          items: { type: number },
                          minItems: 4,
                          maxItems: 4,
                        }
                      shape_count: { type: integer }
                      spaces:
                        {
                          type: array,
                          items: { $ref: "#/components/schemas/FlowPlate" },
                        }

    FlowSpace3d:
      type: object
      required: [space_ref, floor, category, centroid_m]
      properties:
        space_ref: { type: string }
        floor: { type: integer }
        category: { type: string }
        service_line:
          type: string
          nullable: true
          description:
            Canonical service-line code this space serves (legacy catalog aliases folded
            to canonical). Keys into the `service_lines` legend for color. Null for
            corridors / unmapped spaces (rendered as `unassigned`).
        unit_id: { type: integer, nullable: true }
        bed_id: { type: integer, nullable: true }
        centroid_m:
          type: object
          description: 3D centroid in metres; y is the vertical (floor) axis.
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }

    FlowServiceLineStyle:
      type: object
      description: One legend entry — the visual identity a service line carries on the 4D map.
      required: [name, color]
      properties:
        name: { type: string, description: Display name for the legend row. }
        domain:
          { type: string, nullable: true, description: Clinical domain family. }
        color:
          {
            type: string,
            description: Hex color (categorical data-viz palette).,
          }
        sort:
          {
            type: integer,
            description: Registry sort order for stable legend sequence.,
          }

    FlowSpaces3dEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [version, facility, service_lines, spaces]
              properties:
                version: { type: string }
                units:
                  { type: string, description: Geometry unit contract note. }
                facility:
                  type: object
                  properties:
                    code: { type: string }
                    cad_code: { type: string }
                    name: { type: string }
                service_lines:
                  type: object
                  description:
                    Colored legend for the service lines present in this asset, keyed by
                    canonical code, plus an `unassigned` entry. The single source of truth
                    for map color so iOS/Android never drift.
                  additionalProperties:
                    { $ref: "#/components/schemas/FlowServiceLineStyle" }
                spaces:
                  type: array
                  items: { $ref: "#/components/schemas/FlowSpace3d" }

    FlowDuty:
      type: object
      description:
        One persona duty — an actionable worklist item, spatially anchored
        (centroid_m) and due-dated (due_at + window_status), with the governed
        BFF endpoint that actions it. Patient identity only as
        patient_context_ref at the lens depth; null for patient_dots:none.
      required: [id, kind, label, tier]
      properties:
        id: { type: string }
        kind:
          type: string
          enum:
            [
              transport_run,
              bed_turn,
              placement,
              barrier_resolve,
              staffing_fill,
              approval,
              discharge_leverage,
            ]
        label: { type: string }
        space_ref: { type: string, nullable: true }
        unit_id: { type: integer, nullable: true }
        bed_id: { type: integer, nullable: true }
        centroid_m:
          type: object
          nullable: true
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }
        due_at: { type: string, format: date-time, nullable: true }
        window_status:
          { type: string, nullable: true, enum: [overdue, due, upcoming] }
        tier: { type: string, enum: [critical, warning, info] }
        patient_context_ref: { type: string, nullable: true }
        provenance:
          type: object
          properties:
            service: { type: string }
        action:
          type: object
          nullable: true
          properties:
            endpoint: { type: string }
            method: { type: string }
            label: { type: string }

    FlowTimelineEvent:
      type: object
      description:
        One normalized review-half event. Patient identity appears ONLY as
        patient_context_ref (ptok), and only at the lens' depth — payloads
        for patient_dots:none personas carry neither tokens nor patient
        entities.
      required: [t, kind, label, tier, provenance]
      properties:
        t: { type: string, format: date-time }
        kind:
          {
            type: string,
            enum:
              [
                admit,
                transfer,
                discharge,
                bed_status,
                acuity_changed,
                ed_arrival,
                ed_admit_decision,
                bed_request,
                placement,
                transport_status,
                evs_status,
                barrier_opened,
                barrier_resolved,
                staffing_fill,
                or_milestone,
              ],
          }
        entity:
          oneOf:
            - type: "null"
            - type: object
              properties:
                type: { type: string }
                ref: { oneOf: [{ type: string }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        from_space: { oneOf: [{ type: string }, { type: "null" }] }
        to_space: { oneOf: [{ type: string }, { type: "null" }] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        label: { type: string }
        tier: { type: string, enum: [info, warning, critical] }
        provenance:
          type: object
          properties:
            source: { type: string }

    FlowProjection:
      type: object
      description:
        One prediction-half item. Rendered as a ghost — dashed, translucent,
        confidence-mapped opacity, never a status color. Every item carries
        provenance (source service + unit reliability where applicable).
      required: [t, kind, confidence, label, provenance]
      properties:
        t: { type: string, format: date-time }
        kind:
          {
            type: string,
            enum:
              [
                expected_discharge,
                predicted_census,
                predicted_arrivals,
                scheduled_or_case,
                transport_due,
                evs_due,
                staffing_shift_gap,
                surge_probability,
              ],
          }
        confidence: { type: string, enum: [definite, probable, possible] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        bed_id: { oneOf: [{ type: integer }, { type: "null" }] }
        room:
          {
            oneOf: [{ type: string }, { type: "null" }],
            description:
              OR room name (e.g. "OR 3") on scheduled_or_case items; null for
              every other kind.,
          }
        entity:
          oneOf:
            - type: "null"
            - type: object
              properties:
                type: { type: string }
                ref: { oneOf: [{ type: string }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        label: { type: string }
        value: { oneOf: [{ type: integer }, { type: "null" }] }
        band:
          oneOf:
            - type: "null"
            - type: object
              properties:
                lower: { type: integer }
                upper: { type: integer }
        ends_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        derived:
          {
            type: boolean,
            description: True for chain ghosts (discharge → transport → turn).,
          }
        provenance:
          type: object
          properties:
            service: { type: string }
            reliability:
              {
                oneOf: [{ type: number }, { type: "null" }],
                description: Unit 14-day prediction-vs-actual score (0…1).,
              }

    FlowWindowEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [window, lens, scope]
              properties:
                window:
                  type: object
                  required: [from, to, now, since]
                  properties:
                    from: { type: string, format: date-time }
                    to: { type: string, format: date-time }
                    now: { type: string, format: date-time }
                    since:
                      oneOf:
                        - { type: string, format: date-time }
                        - { type: "null" }
                      description:
                        Echo of the parsed `since` delta cursor (null on a
                        full request). When non-null, `events` and
                        `snapshots` were filtered to t > since;
                        `projections`, `spaces`, and `bed_statuses` are
                        always full.
                lens:
                  type: object
                  properties:
                    role_id: { $ref: "#/components/schemas/MobilePersonaId" }
                    scope_default: { type: string }
                    scopes_allowed: { type: array, items: { type: string } }
                    layers: { type: array, items: { type: string } }
                    event_kinds: { type: array, items: { type: string } }
                    projection_kinds: { type: array, items: { type: string } }
                    patient_dots:
                      { type: string, enum: [full, unit, task, none] }
                    actions: { type: array, items: { type: string } }
                    default_zoom_hours: { type: integer }
                scope:
                  type: object
                  properties:
                    type: { type: string, enum: [house, floor, unit, patient] }
                    floor: { oneOf: [{ type: integer }, { type: "null" }] }
                    unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
                    patient_context_ref:
                      { oneOf: [{ type: string }, { type: "null" }] }
                    label: { type: string }
                spaces:
                  type: object
                  description: Live per-floor rollups + plates version (layer `spaces`).
                snapshots:
                  type: array
                  description: Hourly census checkpoints (layer `snapshots`).
                  items:
                    type: object
                    properties:
                      t: { type: string, format: date-time }
                      unit_id: { type: integer }
                      staffed: { type: integer }
                      occupied: { type: integer }
                      available: { type: integer }
                      blocked: { type: integer }
                events:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/FlowTimelineEvent" },
                  }
                projections:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/FlowProjection" },
                  }
                duties:
                  type: array
                  description:
                    The persona's actionable worklist — spatially anchored,
                    due-dated duties (NATIVE-4D-VIEWER-PLAN). Clamped to the
                    lens duty_kinds, redacted per patient_dots, and served in
                    full even on a `?since=` delta.
                  items: { $ref: "#/components/schemas/FlowDuty" }
                bed_statuses:
                  type: array
                  description:
                    Current bed state for the turn map — strictly "now", never
                    historical or projected (past turns live in events,
                    upcoming ones in projections). Present only when the
                    requested scope is floor or unit AND the caller's lens
                    event_kinds include bed_status; absent for every other
                    lens/scope combination.
                  items:
                    type: object
                    required: [bed_id, unit_id, status]
                    properties:
                      bed_id: { type: integer }
                      unit_id: { type: integer }
                      label: { oneOf: [{ type: string }, { type: "null" }] }
                      status:
                        {
                          type: string,
                          enum: [available, occupied, blocked, dirty],
                        }

    CensusEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/CensusUnit" },
              }
    HouseRollupEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/HouseRollup" }
    HouseRollup:
      type: object
      properties:
        occupancy:
          type: object
          properties:
            occupied: { type: integer }
            staffed: { type: integer }
            percent: { type: integer }
          required: [occupied, staffed, percent]
        net_bed_need: { type: integer }
        pending_placements: { type: integer }
        ed_boarding: { type: integer }
        units:
          { type: array, items: { $ref: "#/components/schemas/CensusUnit" } }
      required:
        [occupancy, net_bed_need, pending_placements, ed_boarding, units]
    BedRequest:
      type: object
      properties:
        id: { type: integer }
        source: { oneOf: [{ type: string }, { type: "null" }] }
        service: { oneOf: [{ type: string }, { type: "null" }] }
        acuity_tier: { oneOf: [{ type: integer }, { type: "null" }] }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        isolation_required:
          { oneOf: [{ type: string }, { type: boolean }, { type: "null" }] }
        required_unit_type: { oneOf: [{ type: string }, { type: "null" }] }
        at: { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
      required: [id, visual_status, tier]
    BedRequestListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/BedRequest" },
              }
    PlacementRecommendationsEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PlacementRecommendations" }
    PlacementRecommendations:
      type: object
      properties:
        recommendations:
          type: array
          items:
            type: object
            properties:
              bed_id: { type: integer }
              bed_label: { type: string }
              unit_name: { type: string }
              score: { type: number }
              chips:
                {
                  type: array,
                  items:
                    {
                      type: object,
                      properties:
                        { label: { type: string }, ok: { type: boolean } },
                    },
                }
            required: [bed_id, bed_label, unit_name, score, chips]
        runner_up_delta: { oneOf: [{ type: integer }, { type: "null" }] }
      required: [recommendations]
    PlacementDecision:
      {
        type: object,
        properties:
          {
            action: { type: string, enum: [accepted, rejected] },
            chosen_bed_id: { type: integer },
            reason: { type: string },
          },
        required: [action],
      }

    # ---- Command / OR / Ops ----
    HouseBriefEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/HouseBrief" }
    HouseBrief:
      type: object
      properties:
        strain: { type: object, additionalProperties: true }
        hero:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              display: { type: string }
              value: {}
              status: { $ref: "#/components/schemas/StatusValue" }
              target_display: { oneOf: [{ type: string }, { type: "null" }] }
              trajectory:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
        generated_at: { type: string, format: date-time }
      required: [strain, hero, generated_at]
    ORBoardEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/ORBoard" }
    ORBoard:
      type: object
      properties:
        rooms:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              status:
                {
                  type: string,
                  enum: [available, in_progress, turnover, delayed],
                }
              tier:
                {
                  $ref: "#/components/schemas/StatusValue",
                  description: Legacy visual-status alias; prefer visual_status.,
                }
              visual_status: { $ref: "#/components/schemas/StatusValue" }
              time_remaining: { oneOf: [{ type: integer }, { type: "null" }] }
              turnover_min: { oneOf: [{ type: integer }, { type: "null" }] }
              current:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
              next:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
            required: [id, name, status, visual_status, tier]
        metrics:
          type: object
          properties:
            running: { type: integer }
            turnover: { type: integer }
            available: { type: integer }
            total: { type: integer }
            avg_turnover_min: { type: integer }
          required: [running, turnover, available, total, avg_turnover_min]
      required: [rooms, metrics]
    OpsInboxEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/OpsApproval" },
              }
    OpsApproval:
      type: object
      properties:
        approval_uuid: { type: string, format: uuid }
        title: { type: string }
        rationale: { oneOf: [{ type: string }, { type: "null" }] }
        type: { oneOf: [{ type: string }, { type: "null" }] }
        risk: { oneOf: [{ type: string }, { type: "null" }] }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        owner: { oneOf: [{ type: string }, { type: "null" }] }
        requested_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
      required: [approval_uuid, title, visual_status, tier]
    ApprovalDecision:
      {
        type: object,
        properties:
          {
            decision: { type: string, enum: [approved, rejected] },
            reason: { type: string },
          },
        required: [decision],
      }

    # ---- Transport / EVS ----
    Sla:
      type: object
      properties:
        minutes_until_due:
          { oneOf: [{ type: integer }, { type: number }, { type: "null" }] }
        at_risk: { type: boolean }
        label: { type: string }
      required: [at_risk, label]
    TransportQueueEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TransportQueue" }
    TransportQueue:
      type: object
      properties:
        metrics:
          type: object
          properties:
            active: { type: integer }
            stat: { type: integer }
            at_risk: { type: integer }
            completed_today: { type: integer }
          required: [active, stat, at_risk, completed_today]
        jobs:
          { type: array, items: { $ref: "#/components/schemas/TransportJob" } }
      required: [metrics, jobs]
    TransportJob:
      type: object
      properties:
        id: { type: integer }
        uuid: { oneOf: [{ type: string, format: uuid }, { type: "null" }] }
        type: { type: string }
        priority: { type: string }
        status: { type: string }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        origin: { oneOf: [{ type: string }, { type: "null" }] }
        destination: { oneOf: [{ type: string }, { type: "null" }] }
        mode: { oneOf: [{ type: string }, { type: "null" }] }
        needed_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        claimed_by_me: { type: boolean }
        available_to_claim: { type: boolean }
        resource_name: { oneOf: [{ type: string }, { type: "null" }] }
        handoff_required: { type: boolean }
        allowed_transitions:
          {
            type: array,
            items: { $ref: "#/components/schemas/TransportStatus" },
          }
        can_handoff: { type: boolean }
        lifecycle_version: { type: integer, minimum: 1 }
        sla: { $ref: "#/components/schemas/Sla" }
      required:
        [
          id,
          type,
          priority,
          status,
          visual_status,
          tier,
          claimed_by_me,
          available_to_claim,
          handoff_required,
          allowed_transitions,
          can_handoff,
          lifecycle_version,
          sla,
        ]
    EvsQueueEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EvsQueue" }
    EvsQueue:
      type: object
      properties:
        metrics:
          type: object
          properties:
            pending: { type: integer }
            overdue: { type: integer }
            isolation: { type: integer }
            completed_today: { type: integer }
          required: [pending, overdue, isolation, completed_today]
        turns: { type: array, items: { $ref: "#/components/schemas/EvsTurn" } }
      required: [metrics, turns]
    EvsTurn:
      type: object
      properties:
        id: { type: integer }
        uuid: { oneOf: [{ type: string, format: uuid }, { type: "null" }] }
        request_type: { type: string }
        priority: { type: string }
        status: { type: string }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        location_label: { oneOf: [{ type: string }, { type: "null" }] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        turn_type: { oneOf: [{ type: string }, { type: "null" }] }
        isolation_required: { type: boolean }
        needed_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        sla: { $ref: "#/components/schemas/Sla" }
      required:
        [
          id,
          request_type,
          priority,
          status,
          visual_status,
          tier,
          isolation_required,
          sla,
        ]
    TransportStatus:
      type: string
      enum:
        [
          requested,
          accepted,
          queued,
          assigned,
          dispatched,
          arrived_pickup,
          patient_ready,
          patient_not_ready,
          picked_up,
          en_route,
          arrived_destination,
          handoff_started,
          handoff_complete,
          escalated,
          completed,
          canceled,
          failed,
        ]
    StatusTransition:
      type: object
      properties:
        status: { $ref: "#/components/schemas/TransportStatus" }
        reason:
          type: string
          maxLength: 500
          description: "Required for patient_not_ready, escalated, canceled, and failed."
        note: { type: string, maxLength: 500 }
        lifecycle_version:
          type: integer
          minimum: 0
          description: Version from the last server response; keeps retries stable while separating later commands with the same target status.
      required: [status]
    Handoff:
      type: object
      properties:
        handoff_to: { type: string }
        receiver_role: { type: string }
        acceptance_status:
          { type: string, enum: [accepted, accepted_with_risks] }
        accepted_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        handoff_summary: { type: string }
        lifecycle_version:
          type: integer
          minimum: 0
          description: Version from the last server response; included in the native retry-key material.
        documents:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              type: { type: string, maxLength: 80 }
              reference: { type: string, maxLength: 200 }
            required: [type, reference]
        outstanding_risks:
          type: array
          maxItems: 20
          items: { type: string, maxLength: 300 }
          description: Required and non-empty when acceptance_status is accepted_with_risks.
      required: [handoff_to, receiver_role, acceptance_status]

    # ---- Staffing / Improvement ----
    StaffingOverviewEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/StaffingOverview" }
    StaffingOverview:
      type: object
      properties:
        metrics:
          type: object
          properties:
            open_requests: { type: integer }
            at_risk_units: { type: integer }
            critical_gaps: { type: integer }
            unfilled_requests: { type: integer }
            total_gap_headcount: { type: integer }
            coverage_pct: { type: integer }
            stat_requests: { type: integer }
          required:
            [
              open_requests,
              at_risk_units,
              critical_gaps,
              total_gap_headcount,
              coverage_pct,
              stat_requests,
            ]
        coverage: { type: object, additionalProperties: true }
        units_at_risk:
          { type: array, items: { type: object, additionalProperties: true } }
        by_role:
          { type: array, items: { type: object, additionalProperties: true } }
        queue:
          {
            type: array,
            items: { $ref: "#/components/schemas/StaffingRequest" },
          }
        resource_options:
          { type: array, items: { type: object, additionalProperties: true } }
      required:
        [metrics, coverage, units_at_risk, by_role, queue, resource_options]
    StaffingFill:
      type: object
      properties:
        staff_member_id: { type: integer, minimum: 1 }
        assigned_source:
          { type: string, enum: [float_pool, overtime, agency, on_call] }
        owner_name:
          { oneOf: [{ type: string, maxLength: 120 }, { type: "null" }] }
      required: [staff_member_id, assigned_source]
    StaffingCandidatePageEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                data:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/StaffingCandidate" },
                  }
                meta:
                  type: object
                  properties:
                    current_page: { type: integer }
                    last_page: { type: integer }
                    per_page: { type: integer }
                    total: { type: integer }
                  required: [current_page, last_page, per_page, total]
                shift:
                  type: object
                  properties:
                    starts_at: { type: string, format: date-time }
                    ends_at: { type: string, format: date-time }
                    timezone: { type: string }
                  required: [starts_at, ends_at, timezone]
              required: [data, meta, shift]
    StaffingCandidate:
      type: object
      properties:
        staff_member_id: { type: integer }
        display_name: { type: string }
        role_code: { type: string }
        role_label: { type: string }
        eligible: { type: boolean }
        eligibility_state:
          {
            type: string,
            enum: [eligible, unqualified, unavailable, conflicted],
          }
        reason_codes: { type: array, items: { type: string } }
        qualification_requirements:
          { type: array, items: { type: object, additionalProperties: true } }
        availability: { type: object, additionalProperties: true }
        overlapping_assignments: { type: integer }
        shift: { type: object, additionalProperties: true }
      required:
        [
          staff_member_id,
          display_name,
          role_code,
          role_label,
          eligible,
          eligibility_state,
          reason_codes,
          overlapping_assignments,
        ]
    StaffingRequestEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/StaffingRequest" }
    StaffingRequest:
      type: object
      properties:
        staffing_request_id: { type: integer }
        request_uuid: { type: string, format: uuid }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        unit_label: { oneOf: [{ type: string }, { type: "null" }] }
        staffing_plan_id: { oneOf: [{ type: integer }, { type: "null" }] }
        role: { type: string }
        role_label: { type: string }
        shift_date:
          { oneOf: [{ type: string, format: date }, { type: "null" }] }
        shift: { oneOf: [{ type: string }, { type: "null" }] }
        request_type: { type: string }
        priority: { type: string }
        status: { type: string }
        headcount_needed: { oneOf: [{ type: integer }, { type: "null" }] }
        hours_needed: { oneOf: [{ type: number }, { type: "null" }] }
        needed_by:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        assigned_source: { oneOf: [{ type: string }, { type: "null" }] }
        owner_name: { oneOf: [{ type: string }, { type: "null" }] }
        risk_flags: { type: array, items: { type: string } }
        resolution_payload: { type: object, additionalProperties: true }
        metadata: { type: object, additionalProperties: true }
        sla: { $ref: "#/components/schemas/Sla" }
      required: [staffing_request_id, role, role_label, priority, status, sla]
    PdsaCycleListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              { type: array, items: { $ref: "#/components/schemas/PdsaCycle" } }
    PdsaCycle:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        status: { type: string }
        owner: { oneOf: [{ type: string }, { type: "null" }] }
        objective: { oneOf: [{ type: string }, { type: "null" }] }
        unit: { oneOf: [{ type: string }, { type: "null" }] }
        started_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        target_date:
          { oneOf: [{ type: string, format: date }, { type: "null" }] }
      required: [id, title, status]
    ImprovementOpportunityListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ImprovementOpportunity" },
              }
    ImprovementOpportunity:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { oneOf: [{ type: string }, { type: "null" }] }
        department: { oneOf: [{ type: string }, { type: "null" }] }
        priority: { type: string }
        status: { type: string }
        impact: { oneOf: [{ type: number }, { type: "null" }] }
      required: [id, title, priority, status]

    # ---- Realtime ----
    RealtimeConfig:
      type: object
      properties:
        scheme: { type: string, enum: [reverb-pusher] }
        host: { type: string }
        port: { type: integer }
        key: { type: string }
        channels:
          {
            type: array,
            items: { type: string },
            description: "PHI-free public channels (e.g. unit.{id}, hospital.beds).",
          }
        note:
          {
            type: string,
            description: Reverb does not replay — re-snapshot tracked queries on every (re)connect.,
          }
    RealtimeConfigEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - {
            type: object,
            properties:
              { data: { $ref: "#/components/schemas/RealtimeConfig" } },
          }

    # ---- Eddy (process-aware AI agent) ----
    EddyChatRequest:
      type: object
      properties:
        message: { type: string, maxLength: 8000 }
        surface:
          {
            type: string,
            description: "ed|rtdc|periop|transport|evs|staffing|improvement|command_center|chat",
            default: chat,
          }
        conversation_id:
          {
            type: string,
            format: uuid,
            description: Continue an existing conversation; omit to start a new one.,
          }
        page_context:
          {
            type: string,
            description: The mobile screen Eddy is invoked from (process-awareness hint).,
          }
      required: [message]
    EddyProposedAction:
      type: object
      description: A DRAFT for human approval — Eddy never executes. Render the approval sheet from this.
      properties:
        action_type:
          {
            type: string,
            enum:
              [
                flag_barrier,
                propose_huddle_action,
                propose_transport_dispatch,
                propose_bed_placement,
                propose_surge_plan,
              ],
          }
        title: { type: string }
        params:
          {
            type: object,
            additionalProperties: true,
            description: Operational params (unit codes/counts) — not patient PHI.,
          }
        rationale: { type: string }
        runner_up:
          {
            type: string,
            description: The defensible alternative Eddy weighed.,
          }
        tier: { type: string, enum: [T1, T2, T3, T4] }
        risk: { type: string, enum: [low, medium, high, critical] }
        label: { type: string }
    EddyMessage:
      type: object
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        provider:
          {
            type: string,
            description: "ollama|anthropic — the model that answered.",
          }
        proposed_action:
          {
            oneOf:
              [
                { $ref: "#/components/schemas/EddyProposedAction" },
                { type: "null" },
              ],
          }
    EddyChatEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                conversation_id: { type: string, format: uuid }
                status: { type: string, enum: [success, error] }
                message:
                  oneOf:
                    - { $ref: "#/components/schemas/EddyMessage" }
                    - {
                        type: string,
                        description: A notice string on hard failure (status=error).,
                      }
    EddyApprovalSummary:
      type: object
      description: PHI-free summary the doorbell deep-links into. Tier is server-derived from the action catalog.
      properties:
        approval_uuid: { type: string, format: uuid }
        action_uuid: { type: string, format: uuid }
        action_type: { type: string }
        title: { type: string }
        surface: { type: string }
        tier: { type: string, enum: [T1, T2, T3, T4] }
        risk: { type: string, enum: [low, medium, high, critical] }
        requested_at: { type: string, format: date-time }
      required: [approval_uuid, action_type, tier]
    EddyApprovalListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/EddyApprovalSummary" },
              }
    EddyApprovalPreviewEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              allOf:
                - { $ref: "#/components/schemas/EddyApprovalSummary" }
                - type: object
                  properties:
                    rationale: { type: string }
                    runner_up: { type: string }
                    params:
                      {
                        type: object,
                        additionalProperties: true,
                        description: Operational params only — no patient PHI.,
                      }
                    preview:
                      {
                        type: string,
                        description: Human-readable "would do X" dry-run descriptor.,
                      }
    EddyApprovalDecision:
      type: object
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reason: { type: string, maxLength: 1000 }
      required: [decision]
