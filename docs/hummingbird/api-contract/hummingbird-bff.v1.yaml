openapi: 3.1.0
info:
  title: Hummingbird Mobile BFF
  version: 1.0.0-draft
  description: >
    The mobile Backend-for-Frontend for Hummingbird — the ONLY surface the native
    apps consume. Aggregates and reshapes the existing Zephyrus services for mobile:
    one screen → one call, uniform envelope, role-scoped, PHI-minimized, token-authed.
    Mutations DELEGATE to existing lifecycle services (no business logic re-implemented).
    This is a v1 DRAFT sketch covering the highest-value endpoints; it generates the
    Ktor client (shared KMP) and serves as the contract for the conformance test spec.
servers:
  - url: https://{host}/api/mobile/v1
    variables: { host: { default: zephyrus.example.org } }

security:
  - bearerAuth: []

tags:
  - { name: auth }
  - { name: me }
  - { name: altitude }
  - { name: for-you }
  - { name: rtdc }
  - { name: patients }
  - { name: activity }
  - { name: ops }
  - { name: or }
  - { name: command }
  - { name: transport }
  - { name: evs }
  - { name: staffing }
  - { name: improvement }
  - { name: realtime }
  - { name: eddy }

paths:
  /auth/token:
    post:
      tags: [auth]
      security: []
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Exchange credentials (or OIDC code) for tokens. Honors must_change_password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: "#/components/schemas/PasswordGrant" }
                - { $ref: "#/components/schemas/OidcCodeGrant" }
      responses:
        "200":
          description: Tokens issued (or a password-change challenge).
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/TokenResponse" }
                  - { $ref: "#/components/schemas/PasswordChangeChallenge" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/token/refresh:
    post:
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      security: []
      summary: Rotate refresh → new access token.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/TokenResponse" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/token/revoke:
    post:
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Revoke this device's tokens (logout / remote-wipe support).
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/change-password:
    post:
      tags: [auth]
      servers:
        [
          {
            url: "https://{host}/api",
            variables: { host: { default: zephyrus.example.org } },
          },
        ]
      summary: Forced/normal password change (mirrors the locked web flow; does not replace it).
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ChangePassword" } },
            },
        }
      responses:
        "200":
          {
            description: Changed; tokens issued,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/TokenResponse" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/InvalidBody" }

  /me:
    get:
      tags: [me]
      summary: Profile, role, workflow_preference, prefs.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/MeEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /me/preferences:
    put:
      tags: [me]
      summary: Notification tiers, quiet hours, theme, default workflow.
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/Preferences" } },
            },
        }
      responses:
        "200": { description: Updated }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /devices:
    post:
      tags: [me]
      summary: Register an APNs/FCM push token for this device.
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/DeviceRegistration" } },
            },
        }
      responses:
        "201": { description: Registered }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /devices/{device}:
    delete:
      tags: [me]
      summary: Revoke a registered mobile device token.
      parameters:
        [{ name: device, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          {
            description: Revoked,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /altitude/home:
    get:
      tags: [altitude]
      summary: A0 Persona Glance composed from the shared operational snapshot.
      parameters:
        [
          {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
            description: Confirmed shift role; defaults from the token/user when absent.,
          },
        ]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeHomeEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /altitude/workspace/{domain}:
    get:
      tags: [altitude]
      summary: A1 Live Workspace for a domain queue or board.
      parameters:
        - {
            name: domain,
            in: path,
            required: true,
            schema:
              {
                type: string,
                enum:
                  [rtdc, capacity, transport, evs, staffing, ops, approvals],
              },
          }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeWorkspaceEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /drills/{itemUuid}:
    get:
      tags: [altitude]
      summary: A2 drill for a For You item, alert, queue row, or operational event.
      parameters:
        - { name: itemUuid, in: path, required: true, schema: { type: string } }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/MobileAltitudeDrillEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /patients/{contextRef}/operational-context:
    get:
      tags: [patients]
      summary: A2P Patient/Encounter Lens for authorized operational detail entry.
      parameters:
        - {
            name: contextRef,
            in: path,
            required: true,
            schema: { type: string },
            description: Opaque patient_context_ref issued by A2 drill/list surfaces. Raw patient identifiers are rejected.,
          }
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/PatientOperationalContextEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /activity:
    get:
      tags: [activity]
      summary: Role-filtered cross-persona operational event feed.
      parameters:
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/ActivityFeedEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /activity/{eventUuid}/ack:
    post:
      tags: [activity]
      summary: Acknowledge that an event was seen without mutating the operational object.
      parameters:
        [
          {
            name: eventUuid,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        "200":
          {
            description: Acknowledged,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /for-you:
    get:
      tags: [for-you]
      summary: The unified, ranked, cross-domain action queue for this worker.
      parameters:
        - {
            name: persona,
            in: query,
            schema: { $ref: "#/components/schemas/MobilePersonaId" },
          }
        - {
            name: updated_since,
            in: query,
            schema: { type: string, format: date-time },
            description: Delta sync.,
          }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/ForYouEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flow/floors:
    get:
      tags: [flow]
      summary:
        Versioned, simplified 2D floor-plate asset (geometry + unit/bed
        bridges, no live state). Strong ETag; clients revalidate with
        If-None-Match and render from cache on 304.
      parameters:
        - name: If-None-Match
          in: header
          schema: { type: string }
          description: "Previously returned ETag (the plates version)."
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/FlowFloorsEnvelope" },
                  },
              },
          }
        "304": { description: Not modified — render the cached plates. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flow/spaces3d:
    get:
      tags: [flow]
      summary:
        Versioned 3D space-anchor asset for the native SceneKit/Filament
        viewers — per-space centroid (metres) + unit/bed bridges to place
        patient tokens and duty markers over the GLB shell. Geometry only,
        no live state. Strong ETag; revalidate with If-None-Match.
      parameters:
        - name: If-None-Match
          in: header
          schema: { type: string }
          description: "Previously returned ETag (the spaces3d version)."
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/FlowSpaces3dEnvelope" },
                  },
              },
          }
        "304": { description: Not modified — render the cached anchors. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flow/demo-scenarios:
    get:
      tags: [flow]
      summary:
        Available synthetic Patient Flow scenarios and their enabled state.
        Scenario data is explicitly labeled and remains separate from live
        operational projections.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /flow/occupancy/history:
    get:
      tags: [flow]
      summary:
        Persona-lensed persisted occupancy history for Patient Flow review.
      parameters:
        - name: persona
          in: query
          schema: { $ref: "#/components/schemas/MobilePersonaId" }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: asOf, in: query, schema: { type: string, format: date-time } }
        - { name: service_line, in: query, schema: { type: string } }
        - { name: floor, in: query, schema: { type: integer } }
        - { name: scenario, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 500 } }
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          {
            description: Invalid occupancy-history window,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Error" } },
              },
          }

  /flow/window:
    get:
      tags: [flow]
      summary:
        The persona-lensed 48h Flow Window — census checkpoints (review),
        normalized events (review), and typed projections with confidence +
        provenance (prediction), for one scope. Layers, kinds, scope, and
        patient depth are clamped server-side by the caller's flow lens;
        an out-of-lens scope is an explicit 403 unauthorized state.
      parameters:
        - name: persona
          in: query
          schema: { $ref: "#/components/schemas/MobilePersonaId" }
        - name: scope
          in: query
          schema: { type: string }
          description: "house | floor:{n} | unit:{id|abbr} | patient:{ptok_…} (default: the lens' scope_default)."
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: "Window start; clamped into [now-24h, now+24h]."
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: "Window end; clamped into [now-24h, now+24h]."
        - name: layers
          in: query
          schema: { type: string }
          description: "Comma list of snapshots,events,projections,spaces (intersected with the lens)."
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description:
            "Delta refresh cursor. When present, `events` and `snapshots`
            contain only items with t > since, while `projections`, `spaces`,
            and `bed_statuses` are always recomputed and served in full.
            Everything else (lens clamping, scope resolution, redaction)
            behaves exactly like a full request, and the parsed value is
            echoed back as `window.since`. Must parse as ISO8601 and lie
            within [window.from, window.to); anything else is a 422."
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/FlowWindowEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description:
            Invalid `since` — not parseable as ISO8601, or outside
            [window.from, window.to).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /rtdc/census:
    get:
      tags: [rtdc]
      summary: Live unit census + acuity-adjusted safe capacity (mirrors Reverb CensusUpdated).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/CensusEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /rtdc/house:
    get:
      tags: [rtdc]
      summary: Hospital bed-need roll-up (net/deficit per unit + total).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/HouseRollupEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /rtdc/bed-requests:
    get:
      tags: [rtdc]
      summary: Pending bed requests (role-scoped).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/BedRequestListEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /rtdc/bed-requests/{id}/recommendations:
    get:
      tags: [rtdc]
      summary: Ranked bed recommendations for a pending placement.
      parameters:
        [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/PlacementRecommendationsEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /rtdc/bed-requests/{id}/decision:
    post:
      tags: [rtdc]
      summary: Accept or reject a placement decision. Delegates to the placement service.
      parameters:
        [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/PlacementDecision" } },
            },
        }
      responses:
        "200": { description: Decided }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /rtdc/barriers/{id}/resolve:
    post:
      tags: [rtdc]
      summary: Resolve a discharge barrier.
      parameters:
        [{ name: id, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: Resolved }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /ops/inbox:
    get:
      tags: [ops]
      summary: Approvals/actions summary (pending/active/assigned/overdue).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/OpsInboxEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /ops/approvals/{uuid}/decision:
    post:
      tags: [ops]
      summary: Approve / reject a recommendation's action. Delegates to OperationalActionLifecycleService.
      parameters:
        [
          {
            name: uuid,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/ApprovalDecision" } },
            },
        }
      responses:
        "200": { description: Decided }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/InvalidBody" }

  /or/board:
    get:
      tags: [or]
      summary: Live OR room-status board (Available/In-Progress/Turnover from the wheels clock).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/ORBoardEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /command/house:
    get:
      tags: [command]
      summary: House strain/surge index (0-4) + hero KPIs + 24h forecast.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/HouseBriefEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /transport/queue:
    get:
      tags: [transport]
      summary: My queue + available transport jobs (role-scoped).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/TransportQueueEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /transport/requests/{id}/status:
    post:
      tags: [transport]
      summary: Progress a transport request through its 17-status lifecycle. Delegates to TransportOperationsService.
      parameters:
        [{ name: id, in: path, required: true, schema: { type: string } }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/StatusTransition" } },
            },
        }
      responses:
        "200": { description: Progressed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /transport/requests/{id}/handoff:
    post:
      tags: [transport]
      summary: Structured handoff (handoff_to, summary, documents[], outstanding_risks[]).
      parameters:
