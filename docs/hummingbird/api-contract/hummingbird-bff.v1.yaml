  # ---- Eddy — process-aware AI agent (Phase 5 mobile embed) ----
  /eddy/chat:
    post:
      tags: [eddy]
      summary: Send a turn to Eddy. Stateless service; Laravel persists the conversation (origin=hummingbird).
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/EddyChatRequest" } },
            },
        }
      responses:
        "200":
          {
            description: Assistant reply.,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/EddyChatEnvelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
        "503":
          description: Eddy unreachable. envelope.meta.stale=true; data.message is a notice string.
  /eddy/chat/stream:
    post:
      tags: [eddy]
      summary: SSE token stream. Frames - conversation_id, then token, a terminal persisted (with proposed_action), then [DONE].
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/EddyChatRequest" } },
            },
        }
      responses:
        "200":
          {
            description: text/event-stream,
            content: { text/event-stream: { schema: { type: string } } },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /eddy/conversations:
    get:
      tags: [eddy]
      summary: The user's recent Eddy conversations (most recent first).
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /eddy/conversations/{uuid}:
    get:
      tags: [eddy]
      summary: One conversation with its messages (user-scoped).
      parameters:
        [
          {
            name: uuid,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /eddy/approvals:
    get:
      tags: [eddy]
      summary: Pending Eddy-proposed approvals the user may act on (the doorbell deep-links here). PHI-minimized.
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/EddyApprovalListEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /eddy/approvals/{uuid}:
    get:
      tags: [eddy]
      summary: Fetch-on-open dry-run preview for one pending approval (operational params only — no patient PHI).
      parameters:
        [
          {
            name: uuid,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        $ref: "#/components/schemas/EddyApprovalPreviewEnvelope",
                      },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /eddy/approvals/{uuid}/decision:
    post:
      tags: [eddy]
      summary: Approve/reject a pending Eddy approval. Requires the mobile:act scope (a human decision; never the agent). Block offline.
      parameters:
        [
          {
            name: uuid,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema: { $ref: "#/components/schemas/EddyApprovalDecision" },
                },
            },
        }
      responses:
        "200":
          {
            description: Decided.,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/Envelope" } },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/InvalidBody" }
  /eddy/context/{scopeRef}:
    get:
      tags: [eddy]
      summary: Eddy-safe context packet for a drill, patient lens, event, or flow scope.
      parameters:
        [{ name: scopeRef, in: path, required: true, schema: { type: string } }]
      responses:
        "200":
          {
            description: OK,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/EddyContextEnvelope" },
                  },
              },
          }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: Sanctum-PAT }

  responses:
    Unauthorized:
      {
        description: Missing/invalid token.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    Forbidden:
      {
        description: Token is valid but lacks the required ability or persona.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    NotFound:
      {
        description: Entity or detail was not found.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }
    Conflict:
      description: State changed since load (optimistic-concurrency / illegal transition). Client should re-fetch and surface "changed since you loaded".
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    InvalidBody:
      {
        description: Request body failed validation.,
        content:
          {
            application/json:
              { schema: { $ref: "#/components/schemas/Error" } },
          },
      }

  schemas:
    # ---- Uniform envelope ----
    Meta:
      type: object
      properties:
        as_of:
          {
            type: string,
            format: date-time,
            description: When this data was current.,
          }
        stale:
          {
            type: boolean,
            description: True if served from a degraded/cached path.,
          }
        version:
          {
            oneOf: [{ type: string }, { type: "null" }],
            description: ETag/version for optimistic concurrency.,
          }
      required: [as_of, stale, version]
    Links:
      type: object
      properties:
        {
          web:
            {
              type: string,
              format: uri,
              description: Deep link to the equivalent web surface.,
            },
        }
    Envelope:
      type: object
      properties:
        data: {}
        meta: { $ref: "#/components/schemas/Meta" }
        links: { $ref: "#/components/schemas/Links" }
      required: [data, meta, links]
    Error:
      type: object
      properties:
        error:
          {
            type: object,
            properties:
              {
                code: { type: string },
                message: { type: string },
                retryable: { type: boolean },
              },
            required: [code, message],
          }
      required: [error]

    # ---- Auth ----
    PasswordGrant:
      {
        type: object,
        properties:
          {
            grant_type: { type: string, const: password },
            username: { type: string },
            password: { type: string },
            device: { $ref: "#/components/schemas/DeviceRegistration" },
          },
        required: [grant_type, username, password],
      }
    OidcCodeGrant:
      {
        type: object,
        properties:
          {
            grant_type: { type: string, const: oidc_code },
            code: { type: string },
            code_verifier: { type: string },
            redirect_uri: { type: string },
          },
        required: [grant_type, code, code_verifier],
      }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_in:
          { type: integer, description: Access-token lifetime (seconds). }
        abilities:
          {
            type: array,
            items: { type: string },
            description: Token scopes matching the user's role.,
          }
      required: [access_token, refresh_token, token_type, expires_in]
    PasswordChangeChallenge:
      type: object
      description: Returned when must_change_password is true. Scoped token is valid ONLY for /auth/change-password.
      properties:
        {
          password_change_required: { type: boolean, const: true },
          change_token: { type: string },
        }
      required: [password_change_required, change_token]
    ChangePassword:
      {
        type: object,
        properties:
          {
            current_password: { type: string },
            new_password: { type: string, minLength: 8 },
          },
        required: [new_password],
      }

    # ---- Me / prefs / devices ----
    Workflow:
      {
        type: string,
        enum:
          [superuser, rtdc, perioperative, emergency, improvement, transport],
      }
    MobilePersonaId:
      type: string
      enum:
        [
          charge_nurse,
          bedside_nurse,
          bed_manager,
          house_supervisor,
          hospitalist,
          intensivist,
          evs,
          transport,
          or_nurse,
          capacity_lead,
          periop_manager,
          staffing_coordinator,
          pi_lead,
          executive,
        ]
    StatusValue:
      type: string
      enum: [success, warning, critical, info]
    OperationalStatus:
      type: object
      properties:
        value: { $ref: "#/components/schemas/StatusValue" }
        glyph: { type: string, enum: [check, triangle, octagon, circle] }
        label: { type: string }
        generated_at: { type: string, format: date-time }
      required: [value, label, generated_at]
    MobilePersona:
      type: object
      properties:
        role_id: { $ref: "#/components/schemas/MobilePersonaId" }
        title: { type: string }
        assignment_scope: { type: string, enum: [unit, house] }
        home: { type: string }
        focus: { type: string }
        question: { type: string }
      required: [role_id, title, assignment_scope]
    MeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                id: { type: string }
                name: { type: string }
                roles: { type: array, items: { type: string } }
                is_admin: { type: boolean }
                workflow_preference: { $ref: "#/components/schemas/Workflow" }
                must_change_password: { type: boolean }
                units:
                  {
                    type: array,
                    items: { type: string },
                    description: Units this user is associated with (from user_unit).,
                  }
    Preferences:
      type: object
      properties:
        default_workflow: { $ref: "#/components/schemas/Workflow" }
        theme: { type: string, enum: [dark, light, system], default: dark }
        notification_tiers:
          {
            type: object,
            additionalProperties: { type: boolean },
            description: Per-tier opt-in (T1 discouraged off).,
          }
        quiet_hours:
          {
            type: object,
            properties:
              {
                start: { type: string },
                end: { type: string },
                tz: { type: string },
              },
          }
    DeviceRegistration:
      type: object
      properties:
        platform: { type: string, enum: [ios, android] }
        push_token: { type: string }
        app_version: { type: string }
        locale: { type: string }
      required: [platform, push_token]

    # ---- Home / For-You ----
    HomeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                workflow: { $ref: "#/components/schemas/Workflow" }
                tiles:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/KpiTile" },
                  }
                for_you_head:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/ForYouItem" },
                    description: Top N For-You items inline.,
                  }
    KpiTile:
      type: object
      description: A glanceable metric. status is ALWAYS paired with a trend/label (never color alone).
      properties:
        key: { type: string }
        label: { type: string, description: UPPERCASE functional label. }
        value: { type: string, description: "Pre-formatted, tabular." }
        status: { $ref: "#/components/schemas/StatusValue" }
        trend: { type: string, enum: [up, down, flat] }
        target: { type: string }
        trust:
          { type: string, description: Provenance/source-trust badge text. }
        deep_link: { type: string, format: uri }
      required: [key, label, value, status]
    ForYouItem:
      type: object
      description: One actionable/awareness item, PHI-minimized. The inline primary action is the common response.
      properties:
        id: { type: string }
        type:
          type: string
          description: Server item class, for example bed_request, barrier, capacity, transport, or evs.
        altitude: { type: string, enum: [A2] }
        domain:
          {
            type: string,
            enum:
              [rtdc, ops, or, transport, evs, staffing, improvement, command],
          }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        title: { type: string, description: PHI-free. }
        subtitle: { type: string }
        unit: { oneOf: [{ type: string }, { type: "null" }] }
        at: { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        status: { $ref: "#/components/schemas/StatusValue" }
        status_detail: { $ref: "#/components/schemas/OperationalStatus" }
        primary_action: { $ref: "#/components/schemas/Action" }
        recommended_actions:
          { type: array, items: { $ref: "#/components/schemas/Action" } }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        provenance: { type: object, additionalProperties: true }
        deep_link: { type: string, format: uri }
      required: [id, domain, visual_status, tier, title]
    Action:
      type: object
      properties:
        kind:
          {
            type: string,
            enum:
              [
                approve,
                reject,
                claim,
                start,
                complete,
                resolve,
                acknowledge,
                place,
                view,
                progress_transport,
                progress_turn,
              ],
          }
        label: { type: string }
        endpoint:
          {
            type: string,
            description: BFF path to POST when invoked (also usable from a notification action).,
          }
        method: { type: string, default: POST }
        requires_online: { type: boolean, default: true }
      required: [kind]
    ForYouEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ForYouItem" },
              }
            next_cursor: { type: string }

    MobileAltitudeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                altitude: { type: string, enum: [A0, A1, A2, A2P, A3] }
                persona: { $ref: "#/components/schemas/MobilePersona" }
                status: { $ref: "#/components/schemas/OperationalStatus" }
                generated_at: { type: string, format: date-time }
                patient_context_ref:
                  { oneOf: [{ type: string }, { type: "null" }] }
                provenance: { type: object, additionalProperties: true }
                dependencies:
                  {
                    type: array,
                    items: { type: object, additionalProperties: true },
                  }
                activity:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/ActivityEvent" },
                  }
              required: [altitude, persona, generated_at]
    MobileAltitudeHomeEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeHome" }
    MobileAltitudeHome:
      type: object
      properties:
        altitude: { type: string, const: A0 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        generated_at: { type: string, format: date-time }
        glance_question: { type: string }
        tiles: { type: array, items: { $ref: "#/components/schemas/KpiTile" } }
        for_you_head:
          { type: array, items: { $ref: "#/components/schemas/ForYouItem" } }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        subscriptions: { type: object, additionalProperties: true }
        web: { type: object, additionalProperties: true }
      required:
        [altitude, persona, status, generated_at, glance_question, tiles]
    MobileAltitudeWorkspaceEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeWorkspace" }
    MobileAltitudeWorkspace:
      type: object
      properties:
        altitude: { type: string, const: A1 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        domain: { type: string }
        generated_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        workspace:
          type: object
          properties:
            summary:
              {
                type: object,
                properties:
                  { label: { type: string }, count: { type: integer } },
              }
            items:
              {
                type: array,
                items: { type: object, additionalProperties: true },
              }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        web: { type: object, additionalProperties: true }
      required: [altitude, persona, domain, generated_at, status, workspace]
    MobileAltitudeDrillEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/MobileAltitudeDrill" }
    MobileAltitudeDrill:
      type: object
      properties:
        altitude: { type: string, const: A2 }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        item_uuid: { type: string }
        domain: { type: string }
        generated_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/OperationalStatus" }
        explanation: { type: string }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        activity:
          { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }
        actions: { type: array, items: { $ref: "#/components/schemas/Action" } }
        web: { type: object, additionalProperties: true }
      required:
        [
          altitude,
          persona,
          item_uuid,
          generated_at,
          domain,
          status,
          explanation,
        ]
    PatientOperationalContextEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PatientOperationalContext" }
    PatientOperationalContext:
      type: object
      properties:
        altitude: { type: string, const: A2P }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        patient:
          {
            type: object,
            properties:
              {
                patient_context_ref: { type: string },
                display: { type: string },
                detail_authorized: { type: boolean },
                phi_minimized: { type: boolean },
              },
          }
        header: { type: object, additionalProperties: true }
        status_spine:
          { type: array, items: { type: object, additionalProperties: true } }
        timeline:
          { type: array, items: { type: object, additionalProperties: true } }
        dependencies:
          { type: array, items: { type: object, additionalProperties: true } }
        recommendations:
          { type: array, items: { type: object, additionalProperties: true } }
        actions: { type: array, items: { $ref: "#/components/schemas/Action" } }
        relay: { type: object, additionalProperties: true }
        web: { type: object, additionalProperties: true }
        phi_policy: { type: object, additionalProperties: true }
      required:
        [
          altitude,
          persona,
          patient,
          header,
          status_spine,
          timeline,
          dependencies,
          phi_policy,
        ]
    ActivityEvent:
      type: object
      properties:
        event_uuid: { type: string, format: uuid }
        event_type: { type: string }
        occurred_at: { type: string, format: date-time }
        actor_user_id: { oneOf: [{ type: integer }, { type: "null" }] }
        actor_role: { oneOf: [{ type: string }, { type: "null" }] }
        source_surface: { type: string }
        domain: { type: string }
        scope: { type: object, additionalProperties: true }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        status: { type: object, additionalProperties: true }
        recommendation: { type: object, additionalProperties: true }
        relay: { type: object, additionalProperties: true }
        phi_policy: { type: object, additionalProperties: true }
      required: [event_uuid, event_type, occurred_at, domain]
    ActivityFeedEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ActivityEvent" },
              }
    EddyContextEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EddyContextPacket" }
    EddyContextPacket:
      type: object
      properties:
        scope_ref: { type: string }
        scope_type: { type: string }
        generated_at: { type: string, format: date-time }
        persona: { $ref: "#/components/schemas/MobilePersona" }
        phi_policy: { type: object, additionalProperties: true }
        context:
          {
            type: object,
            additionalProperties: true,
            description: "Event/patient/activity context; authorized house/floor flow scopes may include patient_flow_4d with aggregate-safe current_metrics, top_barriers, redaction, lineage, and action_allowlist.",
          }
        questions_supported: { type: array, items: { type: string } }
      required:
        [scope_ref, scope_type, generated_at, persona, phi_policy, context]

    # ---- RTDC ----
    CensusUnit:
      type: object
      properties:
        unit_id: { type: integer }
        name: { type: string }
        type: { type: string }
        staffed_bed_count: { type: integer }
        occupied: { type: integer }
        available: { type: integer }
        blocked: { type: integer }
        can_admit:
          {
            type: integer,
            description: Acuity-adjusted beds that can be safely admitted now.,
          }
        bed_need: { type: integer, description: ">0 = deficit." }
        status: { $ref: "#/components/schemas/StatusValue" }
      required:
        [
          unit_id,
          name,
          staffed_bed_count,
          occupied,
          available,
          blocked,
          can_admit,
          bed_need,
          status,
        ]
    # ------------------------------------------------------------------
    # Flow Window (FLOW-WINDOW-PLAN) — the persona-lensed 48h surface
    # ------------------------------------------------------------------

    FlowPlate:
      type: object
      description: One simplified plan-view shape (feet; rect = [x, y, w, h]).
      required: [id, code, category, label, rect]
      properties:
        id: { type: integer, description: facility_space_id }
        code: { type: string }
        category:
          {
            type: string,
            enum:
              [
                zone,
                unit,
                room,
                bay,
                bed,
                corridor,
                vertical_transport,
                procedure_room,
                imaging,
              ],
          }
        label: { type: string }
        rect:
          {
            type: array,
            items: { type: number },
            minItems: 4,
            maxItems: 4,
          }
        unit_id: { type: integer }
        bed_id: { type: integer }

    FlowFloorsEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [version, facility, floors]
              properties:
                version: { type: string }
                units: { type: string, description: Geometry unit contract note. }
                facility:
                  type: object
                  properties:
                    code: { type: string }
                    cad_code: { type: string }
                    name: { type: string }
                floors:
                  type: array
                  items:
                    type: object
                    required: [floor, label, bounds, spaces]
                    properties:
                      floor: { type: integer }
                      label: { type: string }
                      bounds:
                        {
                          type: array,
                          items: { type: number },
                          minItems: 4,
                          maxItems: 4,
                        }
                      shape_count: { type: integer }
                      spaces:
                        {
                          type: array,
                          items: { $ref: "#/components/schemas/FlowPlate" },
                        }

    FlowSpace3d:
      type: object
      required: [space_ref, floor, category, centroid_m]
      properties:
        space_ref: { type: string }
        floor: { type: integer }
        category: { type: string }
        service_line:
          type: string
          nullable: true
          description:
            Canonical service-line code this space serves (legacy catalog aliases folded
            to canonical). Keys into the `service_lines` legend for color. Null for
            corridors / unmapped spaces (rendered as `unassigned`).
        unit_id: { type: integer, nullable: true }
        bed_id: { type: integer, nullable: true }
        centroid_m:
          type: object
          description: 3D centroid in metres; y is the vertical (floor) axis.
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }

    FlowServiceLineStyle:
      type: object
      description: One legend entry — the visual identity a service line carries on the 4D map.
      required: [name, color]
      properties:
        name: { type: string, description: Display name for the legend row. }
        domain: { type: string, nullable: true, description: Clinical domain family. }
        color: { type: string, description: Hex color (categorical data-viz palette). }
        sort: { type: integer, description: Registry sort order for stable legend sequence. }

    FlowSpaces3dEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [version, facility, service_lines, spaces]
              properties:
                version: { type: string }
                units: { type: string, description: Geometry unit contract note. }
                facility:
                  type: object
                  properties:
                    code: { type: string }
                    cad_code: { type: string }
                    name: { type: string }
                service_lines:
                  type: object
                  description:
                    Colored legend for the service lines present in this asset, keyed by
                    canonical code, plus an `unassigned` entry. The single source of truth
                    for map color so iOS/Android never drift.
                  additionalProperties: { $ref: "#/components/schemas/FlowServiceLineStyle" }
                spaces:
                  type: array
                  items: { $ref: "#/components/schemas/FlowSpace3d" }

    FlowDuty:
      type: object
      description:
        One persona duty — an actionable worklist item, spatially anchored
        (centroid_m) and due-dated (due_at + window_status), with the governed
        BFF endpoint that actions it. Patient identity only as
        patient_context_ref at the lens depth; null for patient_dots:none.
      required: [id, kind, label, tier]
      properties:
        id: { type: string }
        kind:
          type: string
          enum:
            [
              transport_run,
              bed_turn,
              placement,
              barrier_resolve,
              staffing_fill,
              approval,
              discharge_leverage,
            ]
        label: { type: string }
        space_ref: { type: string, nullable: true }
        unit_id: { type: integer, nullable: true }
        bed_id: { type: integer, nullable: true }
        centroid_m:
          type: object
          nullable: true
          properties:
            x: { type: number }
            y: { type: number }
            z: { type: number }
        due_at: { type: string, format: date-time, nullable: true }
        window_status:
          { type: string, nullable: true, enum: [overdue, due, upcoming] }
        tier: { type: string, enum: [critical, warning, info] }
        patient_context_ref: { type: string, nullable: true }
        provenance:
          type: object
          properties:
            service: { type: string }
        action:
          type: object
          nullable: true
          properties:
            endpoint: { type: string }
            method: { type: string }
            label: { type: string }

    FlowTimelineEvent:
      type: object
      description:
        One normalized review-half event. Patient identity appears ONLY as
        patient_context_ref (ptok), and only at the lens' depth — payloads
        for patient_dots:none personas carry neither tokens nor patient
        entities.
      required: [t, kind, label, tier, provenance]
      properties:
        t: { type: string, format: date-time }
        kind:
          {
            type: string,
            enum:
              [
                admit,
                transfer,
                discharge,
                bed_status,
                acuity_changed,
                ed_arrival,
                ed_admit_decision,
                bed_request,
                placement,
                transport_status,
                evs_status,
                barrier_opened,
                barrier_resolved,
                staffing_fill,
                or_milestone,
              ],
          }
        entity:
          oneOf:
            - type: "null"
            - type: object
              properties:
                type: { type: string }
                ref: { oneOf: [{ type: string }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        from_space: { oneOf: [{ type: string }, { type: "null" }] }
        to_space: { oneOf: [{ type: string }, { type: "null" }] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        label: { type: string }
        tier: { type: string, enum: [info, warning, critical] }
        provenance:
          type: object
          properties:
            source: { type: string }

    FlowProjection:
      type: object
      description:
        One prediction-half item. Rendered as a ghost — dashed, translucent,
        confidence-mapped opacity, never a status color. Every item carries
        provenance (source service + unit reliability where applicable).
      required: [t, kind, confidence, label, provenance]
      properties:
        t: { type: string, format: date-time }
        kind:
          {
            type: string,
            enum:
              [
                expected_discharge,
                predicted_census,
                predicted_arrivals,
                scheduled_or_case,
                transport_due,
                evs_due,
                staffing_shift_gap,
                surge_probability,
              ],
          }
        confidence: { type: string, enum: [definite, probable, possible] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        bed_id: { oneOf: [{ type: integer }, { type: "null" }] }
        room:
          {
            oneOf: [{ type: string }, { type: "null" }],
            description:
              OR room name (e.g. "OR 3") on scheduled_or_case items; null for
              every other kind.,
          }
        entity:
          oneOf:
            - type: "null"
            - type: object
              properties:
                type: { type: string }
                ref: { oneOf: [{ type: string }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        label: { type: string }
        value: { oneOf: [{ type: integer }, { type: "null" }] }
        band:
          oneOf:
            - type: "null"
            - type: object
              properties:
                lower: { type: integer }
                upper: { type: integer }
        ends_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        derived:
          {
            type: boolean,
            description: True for chain ghosts (discharge → transport → turn).,
          }
        provenance:
          type: object
          properties:
            service: { type: string }
            reliability:
              {
                oneOf: [{ type: number }, { type: "null" }],
                description: Unit 14-day prediction-vs-actual score (0…1).,
              }

    FlowWindowEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              required: [window, lens, scope]
              properties:
                window:
                  type: object
                  required: [from, to, now, since]
                  properties:
                    from: { type: string, format: date-time }
                    to: { type: string, format: date-time }
                    now: { type: string, format: date-time }
                    since:
                      oneOf:
                        - { type: string, format: date-time }
                        - { type: "null" }
                      description:
                        Echo of the parsed `since` delta cursor (null on a
                        full request). When non-null, `events` and
                        `snapshots` were filtered to t > since;
                        `projections`, `spaces`, and `bed_statuses` are
                        always full.
                lens:
                  type: object
                  properties:
                    role_id: { $ref: "#/components/schemas/MobilePersonaId" }
                    scope_default: { type: string }
                    scopes_allowed:
                      { type: array, items: { type: string } }
                    layers: { type: array, items: { type: string } }
                    event_kinds: { type: array, items: { type: string } }
                    projection_kinds:
                      { type: array, items: { type: string } }
                    patient_dots:
                      { type: string, enum: [full, unit, task, none] }
                    actions: { type: array, items: { type: string } }
                    default_zoom_hours: { type: integer }
                scope:
                  type: object
                  properties:
                    type:
                      { type: string, enum: [house, floor, unit, patient] }
                    floor: { oneOf: [{ type: integer }, { type: "null" }] }
                    unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
                    patient_context_ref:
                      { oneOf: [{ type: string }, { type: "null" }] }
                    label: { type: string }
                spaces:
                  type: object
                  description: Live per-floor rollups + plates version (layer `spaces`).
                snapshots:
                  type: array
                  description: Hourly census checkpoints (layer `snapshots`).
                  items:
                    type: object
                    properties:
                      t: { type: string, format: date-time }
                      unit_id: { type: integer }
                      staffed: { type: integer }
                      occupied: { type: integer }
                      available: { type: integer }
                      blocked: { type: integer }
                events:
                  {
                    type: array,
                    items:
                      { $ref: "#/components/schemas/FlowTimelineEvent" },
                  }
                projections:
                  {
                    type: array,
                    items: { $ref: "#/components/schemas/FlowProjection" },
                  }
                duties:
                  type: array
                  description:
                    The persona's actionable worklist — spatially anchored,
                    due-dated duties (NATIVE-4D-VIEWER-PLAN). Clamped to the
                    lens duty_kinds, redacted per patient_dots, and served in
                    full even on a `?since=` delta.
                  items: { $ref: "#/components/schemas/FlowDuty" }
                bed_statuses:
                  type: array
                  description:
                    Current bed state for the turn map — strictly "now", never
                    historical or projected (past turns live in events,
                    upcoming ones in projections). Present only when the
                    requested scope is floor or unit AND the caller's lens
                    event_kinds include bed_status; absent for every other
                    lens/scope combination.
                  items:
                    type: object
                    required: [bed_id, unit_id, status]
                    properties:
                      bed_id: { type: integer }
                      unit_id: { type: integer }
                      label: { oneOf: [{ type: string }, { type: "null" }] }
                      status:
                        {
                          type: string,
                          enum: [available, occupied, blocked, dirty],
                        }

    CensusEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/CensusUnit" },
              }
    HouseRollupEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/HouseRollup" }
    HouseRollup:
      type: object
      properties:
        occupancy:
          type: object
          properties:
            occupied: { type: integer }
            staffed: { type: integer }
            percent: { type: integer }
          required: [occupied, staffed, percent]
        net_bed_need: { type: integer }
        pending_placements: { type: integer }
        ed_boarding: { type: integer }
        units:
          { type: array, items: { $ref: "#/components/schemas/CensusUnit" } }
      required:
        [occupancy, net_bed_need, pending_placements, ed_boarding, units]
    BedRequest:
      type: object
      properties:
        id: { type: integer }
        source: { oneOf: [{ type: string }, { type: "null" }] }
        service: { oneOf: [{ type: string }, { type: "null" }] }
        acuity_tier: { oneOf: [{ type: integer }, { type: "null" }] }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        isolation_required:
          { oneOf: [{ type: string }, { type: boolean }, { type: "null" }] }
        required_unit_type: { oneOf: [{ type: string }, { type: "null" }] }
        at: { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
      required: [id, visual_status, tier]
    BedRequestListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/BedRequest" },
              }
    PlacementRecommendationsEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PlacementRecommendations" }
    PlacementRecommendations:
      type: object
      properties:
        recommendations:
          type: array
          items:
            type: object
            properties:
              bed_id: { type: integer }
              bed_label: { type: string }
              unit_name: { type: string }
              score: { type: number }
              chips:
                {
                  type: array,
                  items:
                    {
                      type: object,
                      properties:
                        { label: { type: string }, ok: { type: boolean } },
                    },
                }
            required: [bed_id, bed_label, unit_name, score, chips]
        runner_up_delta: { oneOf: [{ type: integer }, { type: "null" }] }
      required: [recommendations]
    PlacementDecision:
      {
        type: object,
        properties:
          {
            action: { type: string, enum: [accepted, rejected] },
            chosen_bed_id: { type: integer },
            reason: { type: string },
          },
        required: [action],
      }

    # ---- Command / OR / Ops ----
    HouseBriefEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/HouseBrief" }
    HouseBrief:
      type: object
      properties:
        strain: { type: object, additionalProperties: true }
        hero:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
              display: { type: string }
              value: {}
              status: { $ref: "#/components/schemas/StatusValue" }
              target_display: { oneOf: [{ type: string }, { type: "null" }] }
              trajectory:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
        generated_at: { type: string, format: date-time }
      required: [strain, hero, generated_at]
    ORBoardEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/ORBoard" }
    ORBoard:
      type: object
      properties:
        rooms:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              name: { type: string }
              status:
                {
                  type: string,
                  enum: [available, in_progress, turnover, delayed],
                }
              tier:
                {
                  $ref: "#/components/schemas/StatusValue",
                  description: Legacy visual-status alias; prefer visual_status.,
                }
              visual_status: { $ref: "#/components/schemas/StatusValue" }
              time_remaining: { oneOf: [{ type: integer }, { type: "null" }] }
              turnover_min: { oneOf: [{ type: integer }, { type: "null" }] }
              current:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
              next:
                {
                  oneOf:
                    [
                      { type: object, additionalProperties: true },
                      { type: "null" },
                    ],
                }
            required: [id, name, status, visual_status, tier]
        metrics:
          type: object
          properties:
            running: { type: integer }
            turnover: { type: integer }
            available: { type: integer }
            total: { type: integer }
            avg_turnover_min: { type: integer }
          required: [running, turnover, available, total, avg_turnover_min]
      required: [rooms, metrics]
    OpsInboxEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/OpsApproval" },
              }
    OpsApproval:
      type: object
      properties:
        approval_uuid: { type: string, format: uuid }
        title: { type: string }
        rationale: { oneOf: [{ type: string }, { type: "null" }] }
        type: { oneOf: [{ type: string }, { type: "null" }] }
        risk: { oneOf: [{ type: string }, { type: "null" }] }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        owner: { oneOf: [{ type: string }, { type: "null" }] }
        requested_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
      required: [approval_uuid, title, visual_status, tier]
    ApprovalDecision:
      {
        type: object,
        properties:
          {
            decision: { type: string, enum: [approved, rejected] },
            reason: { type: string },
          },
        required: [decision],
      }

    # ---- Transport / EVS ----
    Sla:
      type: object
      properties:
        minutes_until_due:
          { oneOf: [{ type: integer }, { type: number }, { type: "null" }] }
        at_risk: { type: boolean }
        label: { type: string }
      required: [at_risk, label]
    TransportQueueEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TransportQueue" }
    TransportQueue:
      type: object
      properties:
        metrics:
          type: object
          properties:
            active: { type: integer }
            stat: { type: integer }
            at_risk: { type: integer }
            completed_today: { type: integer }
          required: [active, stat, at_risk, completed_today]
        jobs:
          { type: array, items: { $ref: "#/components/schemas/TransportJob" } }
      required: [metrics, jobs]
    TransportJob:
      type: object
      properties:
        id: { type: integer }
        uuid: { oneOf: [{ type: string, format: uuid }, { type: "null" }] }
        type: { type: string }
        priority: { type: string }
        status: { type: string }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        origin: { oneOf: [{ type: string }, { type: "null" }] }
        destination: { oneOf: [{ type: string }, { type: "null" }] }
        mode: { oneOf: [{ type: string }, { type: "null" }] }
        needed_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        sla: { $ref: "#/components/schemas/Sla" }
      required: [id, type, priority, status, visual_status, tier, sla]
    EvsQueueEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EvsQueue" }
    EvsQueue:
      type: object
      properties:
        metrics:
          type: object
          properties:
            pending: { type: integer }
            overdue: { type: integer }
            isolation: { type: integer }
            completed_today: { type: integer }
          required: [pending, overdue, isolation, completed_today]
        turns: { type: array, items: { $ref: "#/components/schemas/EvsTurn" } }
      required: [metrics, turns]
    EvsTurn:
      type: object
      properties:
        id: { type: integer }
        uuid: { oneOf: [{ type: string, format: uuid }, { type: "null" }] }
        request_type: { type: string }
        priority: { type: string }
        status: { type: string }
        tier:
          {
            $ref: "#/components/schemas/StatusValue",
            description: Legacy visual-status alias; prefer visual_status.,
          }
        visual_status: { $ref: "#/components/schemas/StatusValue" }
        location_label: { oneOf: [{ type: string }, { type: "null" }] }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        turn_type: { oneOf: [{ type: string }, { type: "null" }] }
        isolation_required: { type: boolean }
        needed_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        patient_context_ref: { oneOf: [{ type: string }, { type: "null" }] }
        sla: { $ref: "#/components/schemas/Sla" }
      required:
        [
          id,
          request_type,
          priority,
          status,
          visual_status,
          tier,
          isolation_required,
          sla,
        ]
    StatusTransition:
      {
        type: object,
        properties:
          {
            status: { type: string },
            assigned_team: { type: string },
            note: { type: string },
            version:
              { type: string, description: Optimistic-concurrency token. },
          },
        required: [status],
      }
    Handoff:
      type: object
      properties:
        handoff_to: { type: string }
        handoff_summary: { type: string }
        documents: { type: array, items: { type: string } }
        outstanding_risks: { type: array, items: { type: string } }
      required: [handoff_to]

    # ---- Staffing / Improvement ----
    StaffingOverviewEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/StaffingOverview" }
    StaffingOverview:
      type: object
      properties:
        metrics:
          type: object
          properties:
            open_requests: { type: integer }
            at_risk_units: { type: integer }
            critical_gaps: { type: integer }
            unfilled_requests: { type: integer }
            total_gap_headcount: { type: integer }
            coverage_pct: { type: integer }
            stat_requests: { type: integer }
          required:
            [
              open_requests,
              at_risk_units,
              critical_gaps,
              total_gap_headcount,
              coverage_pct,
              stat_requests,
            ]
        coverage: { type: object, additionalProperties: true }
        units_at_risk:
          { type: array, items: { type: object, additionalProperties: true } }
        by_role:
          { type: array, items: { type: object, additionalProperties: true } }
        queue:
          {
            type: array,
            items: { $ref: "#/components/schemas/StaffingRequest" },
          }
        resource_options:
          { type: array, items: { type: object, additionalProperties: true } }
      required:
        [metrics, coverage, units_at_risk, by_role, queue, resource_options]
    StaffingFill:
      type: object
      properties:
        assigned_source: { type: string, maxLength: 120 }
        owner_name:
          { oneOf: [{ type: string, maxLength: 120 }, { type: "null" }] }
      required: [assigned_source]
    StaffingRequestEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/StaffingRequest" }
    StaffingRequest:
      type: object
      properties:
        staffing_request_id: { type: integer }
        request_uuid: { type: string, format: uuid }
        unit_id: { oneOf: [{ type: integer }, { type: "null" }] }
        unit_label: { oneOf: [{ type: string }, { type: "null" }] }
        staffing_plan_id: { oneOf: [{ type: integer }, { type: "null" }] }
        role: { type: string }
        role_label: { type: string }
        shift_date:
          { oneOf: [{ type: string, format: date }, { type: "null" }] }
        shift: { oneOf: [{ type: string }, { type: "null" }] }
        request_type: { type: string }
        priority: { type: string }
        status: { type: string }
        headcount_needed: { oneOf: [{ type: integer }, { type: "null" }] }
        hours_needed: { oneOf: [{ type: number }, { type: "null" }] }
        needed_by:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        assigned_source: { oneOf: [{ type: string }, { type: "null" }] }
        owner_name: { oneOf: [{ type: string }, { type: "null" }] }
        risk_flags: { type: array, items: { type: string } }
        resolution_payload: { type: object, additionalProperties: true }
        metadata: { type: object, additionalProperties: true }
        sla: { $ref: "#/components/schemas/Sla" }
      required: [staffing_request_id, role, role_label, priority, status, sla]
    PdsaCycleListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              { type: array, items: { $ref: "#/components/schemas/PdsaCycle" } }
    PdsaCycle:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        status: { type: string }
        owner: { oneOf: [{ type: string }, { type: "null" }] }
        objective: { oneOf: [{ type: string }, { type: "null" }] }
        unit: { oneOf: [{ type: string }, { type: "null" }] }
        started_at:
          { oneOf: [{ type: string, format: date-time }, { type: "null" }] }
        target_date:
          { oneOf: [{ type: string, format: date }, { type: "null" }] }
      required: [id, title, status]
    ImprovementOpportunityListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/ImprovementOpportunity" },
              }
    ImprovementOpportunity:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { oneOf: [{ type: string }, { type: "null" }] }
        department: { oneOf: [{ type: string }, { type: "null" }] }
        priority: { type: string }
        status: { type: string }
        impact: { oneOf: [{ type: number }, { type: "null" }] }
      required: [id, title, priority, status]

    # ---- Realtime ----
    RealtimeConfig:
      type: object
      properties:
        scheme: { type: string, enum: [reverb-pusher] }
        host: { type: string }
        port: { type: integer }
        key: { type: string }
        channels:
          {
            type: array,
            items: { type: string },
            description: "PHI-free public channels (e.g. unit.{id}, hospital.beds).",
          }
        note:
          {
            type: string,
            description: Reverb does not replay — re-snapshot tracked queries on every (re)connect.,
          }
    RealtimeConfigEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - {
            type: object,
            properties:
              { data: { $ref: "#/components/schemas/RealtimeConfig" } },
          }

    # ---- Eddy (process-aware AI agent) ----
    EddyChatRequest:
      type: object
      properties:
        message: { type: string, maxLength: 8000 }
        surface:
          {
            type: string,
            description: "ed|rtdc|periop|transport|evs|staffing|improvement|command_center|chat",
            default: chat,
          }
        conversation_id:
          {
            type: string,
            format: uuid,
            description: Continue an existing conversation; omit to start a new one.,
          }
        page_context:
          {
            type: string,
            description: The mobile screen Eddy is invoked from (process-awareness hint).,
          }
      required: [message]
    EddyProposedAction:
      type: object
      description: A DRAFT for human approval — Eddy never executes. Render the approval sheet from this.
      properties:
        action_type:
          {
            type: string,
            enum:
              [
                flag_barrier,
                propose_huddle_action,
                propose_transport_dispatch,
                propose_bed_placement,
                propose_surge_plan,
              ],
          }
        title: { type: string }
        params:
          {
            type: object,
            additionalProperties: true,
            description: Operational params (unit codes/counts) — not patient PHI.,
          }
        rationale: { type: string }
        runner_up:
          {
            type: string,
            description: The defensible alternative Eddy weighed.,
          }
        tier: { type: string, enum: [T1, T2, T3, T4] }
        risk: { type: string, enum: [low, medium, high, critical] }
        label: { type: string }
    EddyMessage:
      type: object
      properties:
        id: { type: integer }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        provider:
          {
            type: string,
            description: "ollama|anthropic — the model that answered.",
          }
        proposed_action:
          {
            oneOf:
              [
                { $ref: "#/components/schemas/EddyProposedAction" },
                { type: "null" },
              ],
          }
    EddyChatEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              type: object
              properties:
                conversation_id: { type: string, format: uuid }
                status: { type: string, enum: [success, error] }
                message:
                  oneOf:
                    - { $ref: "#/components/schemas/EddyMessage" }
                    - {
                        type: string,
                        description: A notice string on hard failure (status=error).,
                      }
    EddyApprovalSummary:
      type: object
      description: PHI-free summary the doorbell deep-links into. Tier is server-derived from the action catalog.
      properties:
        approval_uuid: { type: string, format: uuid }
        action_uuid: { type: string, format: uuid }
        action_type: { type: string }
        title: { type: string }
        surface: { type: string }
        tier: { type: string, enum: [T1, T2, T3, T4] }
        risk: { type: string, enum: [low, medium, high, critical] }
        requested_at: { type: string, format: date-time }
      required: [approval_uuid, action_type, tier]
    EddyApprovalListEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              {
                type: array,
                items: { $ref: "#/components/schemas/EddyApprovalSummary" },
              }
    EddyApprovalPreviewEnvelope:
      allOf:
        - { $ref: "#/components/schemas/Envelope" }
        - type: object
          properties:
            data:
              allOf:
                - { $ref: "#/components/schemas/EddyApprovalSummary" }
                - type: object
                  properties:
                    rationale: { type: string }
                    runner_up: { type: string }
                    params:
                      {
                        type: object,
                        additionalProperties: true,
                        description: Operational params only — no patient PHI.,
                      }
                    preview:
                      {
                        type: string,
                        description: Human-readable "would do X" dry-run descriptor.,
                      }
    EddyApprovalDecision:
      type: object
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reason: { type: string, maxLength: 1000 }
      required: [decision]
