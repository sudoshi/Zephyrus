      x-zephyrus-error-behavior:
        envelope: Error
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 429, 500]
      tags: [realtime]
      summary: Reverb host/key + the PHI-free channels this user should subscribe to.
      responses:
        "200":
