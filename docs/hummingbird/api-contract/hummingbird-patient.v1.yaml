openapi: 3.1.0
info:
  title: Hummingbird Patient API
  version: 1.0.0-draft
  description: >-
    Contract for the separately secured Hummingbird inpatient product. The API
    exposes only opaque patient-product handles and governed projections. It is
    fail-closed by default, is isolated to the patient identity realm, and does
    not expose source-system linkage values.
  x-governance-status: draft-not-approved
  x-contract-owner: Patient Experience Platform
  x-zephyrus-identifier-policy:
    permitted: opaque_patient_product_uuids_only
    source_linkage_fields: prohibited
    embedded_source_meaning: prohibited

servers:
  - url: https://{host}/api/patient/v1
    description: Patient product API boundary
    variables:
      host:
        default: zephyrus.example.org

security: []

tags:
  - name: enrollment
  - name: authentication
  - name: profile
  - name: encounters
  - name: sessions
  - name: notification-devices
  - name: messaging

paths:
  /auth/enroll/challenge/verify:
    post:
      operationId: verifyPatientEnrollmentChallenge
      tags: [enrollment]
      summary: Verify an enrollment challenge and issue a patient session
      security: []
      x-zephyrus-authorization:
        realm: patient
        authentication: enrollment_challenge
        required_abilities: []
      x-zephyrus-data-classification:
        request: patient_identity_secret
        response: patient_authentication_secret
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: non_idempotent
        idempotency_key: unsupported
        retry: only_after_definitive_transport_failure
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_ENROLLMENT_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [404, 413, 415, 422, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.enrollment_succeeded]
        denial_events: [patient.auth.enrollment_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: not_applicable
        provenance: enrollment_challenge_and_access_grant
        uncertainty: not_applicable
        retraction: challenge_consumption_or_revocation_prevents_reuse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentVerificationRequest"
      responses:
        "201":
          $ref: "#/components/responses/TokenPairCreated"
        default:
          $ref: "#/components/responses/PatientError"

  /auth/token:
    post:
      operationId: exchangePatientCredentials
      tags: [authentication]
      summary: Exchange patient credentials for a new session
      security: []
      x-zephyrus-authorization:
        realm: patient
        authentication: patient_password
        required_abilities: []
      x-zephyrus-data-classification:
        request: patient_identity_secret
        response: patient_authentication_secret
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: non_idempotent
        idempotency_key: unsupported
        retry: only_after_definitive_transport_failure
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_TOKEN_EXCHANGE_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 413, 415, 422, 423, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.token_issued]
        denial_events: [patient.auth.token_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: not_applicable
        provenance: patient_principal
        uncertainty: not_applicable
        retraction: account_deactivation_or_session_revocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPairOk"
        default:
          $ref: "#/components/responses/PatientError"

  /auth/token/refresh:
    post:
      operationId: refreshPatientSession
      tags: [authentication]
      summary: Rotate a patient refresh credential and its token family
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:refresh"]
        accepted_token_name_prefixes: ["patient-refresh:"]
      x-zephyrus-data-classification:
        request: patient_authentication_secret
        response: patient_authentication_secret
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: non_idempotent
        idempotency_key: unsupported
        retry: never_replay_a_consumed_refresh_credential
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_TOKEN_EXCHANGE_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.token_refreshed]
        denial_events: [patient.auth.refresh_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: not_applicable
        provenance: patient_session
        uncertainty: not_applicable
        retraction: refresh_reuse_revokes_the_session_family
      responses:
        "200":
          $ref: "#/components/responses/TokenPairOk"
        default:
          $ref: "#/components/responses/PatientError"

  /auth/token/revoke:
    post:
      operationId: revokePatientSession
      tags: [authentication]
      summary: Revoke the current patient session
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        any_required_ability: ["patient:access", "patient:refresh"]
        accepted_token_name_prefixes: ["patient-access:", "patient-refresh:"]
      x-zephyrus-data-classification:
        request: patient_authentication_secret
        response: patient_session_state
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: idempotent_outcome
        idempotency_key: unsupported
        retry: permitted_with_same_credential_until_revoked
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_TOKEN_EXCHANGE_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.token_revoked]
        denial_events: []
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: not_applicable
        provenance: patient_session
        uncertainty: not_applicable
        retraction: immediate_session_family_revocation
      responses:
        "200":
          $ref: "#/components/responses/SessionRevokedOk"
        default:
          $ref: "#/components/responses/PatientError"

  /me:
    get:
      operationId: getPatientProfile
      tags: [profile]
      summary: Read the authenticated patient-product profile
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_identity
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_PROFILE_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.profile.viewed]
        denial_events: []
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_principal
        uncertainty: not_applicable
        retraction: account_deactivation_removes_access
      responses:
        "200":
          $ref: "#/components/responses/ProfileOk"
        default:
          $ref: "#/components/responses/PatientError"

  /me/preferences:
    put:
      operationId: updatePatientPreferences
      tags: [profile]
      summary: Replace the supplied patient-product preference values
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
      x-zephyrus-data-classification:
        request: patient_preferences
        response: patient_identity
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: unsupported
        retry: permitted_with_same_body
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_PROFILE_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 413, 415, 422, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.profile.preferences_updated]
        denial_events: []
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_principal
        uncertainty: not_applicable
        retraction: account_deactivation_removes_access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientPreferencesInput"
      responses:
        "200":
          $ref: "#/components/responses/ProfileOk"
        default:
          $ref: "#/components/responses/PatientError"

  /me/notification-devices/{deviceUuid}:
    parameters:
      - $ref: "#/components/parameters/NotificationDeviceUuid"
    put:
      operationId: registerPatientNotificationDevice
      tags: [notification-devices]
      summary: Register or rotate one encrypted patient notification-device token
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        ownership_policy: authenticated_principal_notification_devices_only
      x-zephyrus-data-classification:
        request: patient_notification_provider_secret
        response: patient_notification_device_metadata
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: idempotent_resource_replacement
        idempotency_key: unsupported
        retry: permitted_with_same_device_handle_and_body
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_NOTIFICATION_DEVICES_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 413, 415, 422, 429, 500, 503]
        cross_principal_behavior: generic_not_found
      x-zephyrus-audit:
        required: true
        success_events: [patient.notification_device.registered]
        denial_events: [patient.notification_device.registration_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_notification_device_registry
        uncertainty: registration_does_not_guarantee_delivery
        retraction: explicit_patient_revocation_or_provider_feedback_removes_eligibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientNotificationDeviceRegistrationInput"
      responses:
        "200":
          $ref: "#/components/responses/PatientNotificationDeviceRegistrationOk"
        default:
          $ref: "#/components/responses/PatientError"
    delete:
      operationId: revokePatientNotificationDevice
      tags: [notification-devices]
      summary: Revoke one notification-device registration owned by the authenticated patient
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        ownership_policy: authenticated_principal_notification_devices_only
      x-zephyrus-data-classification:
        request: opaque_patient_notification_device_handle
        response: patient_notification_device_revocation_state
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: idempotent_outcome
        idempotency_key: not_required_for_resource_delete
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_NOTIFICATION_DEVICES_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
        cross_principal_behavior: generic_not_found
      x-zephyrus-audit:
        required: true
        success_events: [patient.notification_device.revoked]
        denial_events: [patient.notification_device.revoke_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_notification_device_registry
        uncertainty: revocation_does_not_retract_already_delivered_provider_messages
        retraction: explicit_patient_revocation
      responses:
        "200":
          $ref: "#/components/responses/PatientNotificationDeviceRevokedOk"
        default:
          $ref: "#/components/responses/PatientError"

  /me/sessions:
    get:
      operationId: listPatientSessions
      tags: [sessions]
      summary: List the authenticated patient's active device sessions
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        ownership_policy: authenticated_principal_sessions_only
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_device_session_metadata
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_SESSION_MANAGEMENT_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.sessions_viewed]
        denial_events: []
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_session_registry
        uncertainty: not_applicable
        retraction: revoked_or_expired_sessions_are_omitted
      responses:
        "200":
          $ref: "#/components/responses/PatientSessionListOk"
        default:
          $ref: "#/components/responses/PatientError"

  /me/sessions/{sessionUuid}:
    parameters:
      - $ref: "#/components/parameters/SessionUuid"
    delete:
      operationId: revokePatientSessionById
      tags: [sessions]
      summary: Revoke one session owned by the authenticated patient
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        ownership_policy: authenticated_principal_sessions_only
      x-zephyrus-data-classification:
        request: opaque_patient_session_handle
        response: patient_session_revocation_state
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: idempotent
        idempotency_key: not_required_for_resource_delete
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_SESSION_MANAGEMENT_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
        cross_principal_behavior: generic_not_found
      x-zephyrus-audit:
        required: true
        success_events: [patient.auth.session_revoked]
        denial_events: [patient.auth.session_revoke_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: generated_at_request_time
        provenance: patient_session_registry
        uncertainty: not_applicable
        retraction: immediate_token_family_revocation
      responses:
        "200":
          $ref: "#/components/responses/PatientSessionRevokedOk"
        default:
          $ref: "#/components/responses/PatientError"

  /encounters:
    get:
      operationId: listPatientEncounterAccess
      tags: [encounters]
      summary: List governed encounter handles currently accessible to the principal
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        relationship_policy: active_non_revoked_grant
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_phi_minimized
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_ENCOUNTERS_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
      x-zephyrus-audit:
        required: true
        success_events: [patient.encounter.disclosed]
        denial_events: []
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: grant_updated_at
        provenance: patient_encounter_access_grant
        uncertainty: no_clinical_assertion_is_made
        retraction: revoked_expired_or_suspended_grants_are_omitted
      responses:
        "200":
          $ref: "#/components/responses/EncounterListOk"
        default:
          $ref: "#/components/responses/PatientError"

  /encounters/{encounterUuid}/today:
    parameters:
      - $ref: "#/components/parameters/EncounterUuid"
    get:
      operationId: getPatientTodayProjection
      tags: [encounters]
      summary: Read the latest governed Today projection for an accessible encounter
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        relationship_policy: active_grant_with_today_read_scope_and_released_projection_relationship
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_phi_released_projection
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_TODAY_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
        unavailable_content_status: 404
        existence_oracle_prevented: true
      x-zephyrus-audit:
        required: true
        success_events: [patient.projection.disclosed]
        denial_events: [patient.projection.disclosure_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: meta.source_freshness_from_projection_observation
        provenance: data.provenance_allowlist
        uncertainty: data.uncertainty_patient_language
        retraction: corrected_or_retracted_release_target_is_omitted_with_indistinguishable_404; a separately released correction replacement may carry a source-free revision_notice
      responses:
        "200":
          $ref: "#/components/responses/TodayProjectionOk"
        default:
          $ref: "#/components/responses/PatientError"

  /encounters/{encounterUuid}/pathway:
    parameters:
      - $ref: "#/components/parameters/EncounterUuid"
    get:
      operationId: getPatientPathwayProjection
      tags: [encounters]
      summary: Read the latest governed pathway projection for an accessible encounter
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        relationship_policy: active_grant_with_pathway_read_scope_and_released_projection_relationship
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_phi_released_projection
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_PATHWAY_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 429, 500]
        unavailable_content_status: 404
        existence_oracle_prevented: true
      x-zephyrus-audit:
        required: true
        success_events: [patient.projection.disclosed]
        denial_events: [patient.projection.disclosure_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: meta.source_freshness_from_projection_observation
        provenance: data.provenance_allowlist
        uncertainty: data.uncertainty_patient_language
        retraction: corrected_or_retracted_release_target_is_omitted_with_indistinguishable_404; a separately released correction replacement may carry a source-free revision_notice
      responses:
        "200":
          $ref: "#/components/responses/PathwayProjectionOk"
        default:
          $ref: "#/components/responses/PatientError"

  /encounters/{encounterUuid}/pathway/events:
    parameters:
      - $ref: "#/components/parameters/EncounterUuid"
    get:
      operationId: getPatientPathwayEvents
      tags: [encounters]
      summary: Read the latest governed pathway-events timeline for an accessible encounter
      security:
        - patientBearer: []
      x-zephyrus-authorization:
        realm: patient
        authentication: bearer
        required_abilities: ["patient:access"]
        accepted_token_name_prefixes: ["patient-access:"]
        relationship_policy: active_grant_with_pathway_read_scope_and_released_projection_relationship
      x-zephyrus-data-classification:
        request: patient_session_state
        response: patient_phi_released_projection
        storage: no_client_cache
      x-zephyrus-idempotency:
        semantics: safe
        idempotency_key: not_applicable
        retry: permitted
      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_PATHWAY_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: draft_not_approved
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
