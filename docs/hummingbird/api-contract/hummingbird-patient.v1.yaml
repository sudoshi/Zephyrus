      x-zephyrus-release-policy:
        product_flag: HUMMINGBIRD_PATIENT_ENABLED
        feature_flag: HUMMINGBIRD_PATIENT_MESSAGING_ENABLED
        default: disabled
        disabled_status: 404
        governance_status: approved_local_policy_also_required
        mutation_readiness: current_message_encryption_key_and_staff_handoff_consumer
      x-zephyrus-error-behavior:
        envelope: PatientErrorEnvelope
        diagnostic_detail_exposed: false
        expected_statuses: [401, 403, 404, 409, 413, 415, 422, 429, 500, 503]
        cross_principal_behavior: generic_not_found
      x-zephyrus-audit:
        required: true
        success_events:
          [
            patient.messaging.thread_closed,
            patient.messaging.thread_close_replayed,
          ]
        denial_events: [patient.messaging.access_denied]
        secret_values_recorded: false
      x-zephyrus-projection-semantics:
        freshness: closed_at_transaction_commit
        provenance: authenticated_principal_and_versioned_thread
        uncertainty: not_applicable
        retraction: closure_is_preserved_as_an_immutable_routing_fact
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageThreadCloseRequest"
      responses:
        "200":
          $ref: "#/components/responses/MessageThreadClosedOk"
        default:
          $ref: "#/components/responses/PatientError"

components:
  parameters:
    EncounterUuid:
      name: encounterUuid
      in: path
      required: true
      description: Opaque patient-product encounter handle from the encounter-access response.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    EducationItemUuid:
      name: educationItemUuid
      in: path
      required: true
      description: Opaque patient-product education item handle from the currently released pathway projection.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    SessionUuid:
      name: sessionUuid
      in: path
      required: true
      description: Opaque patient-product session handle returned by the session registry.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    NotificationDeviceUuid:
      name: deviceUuid
      in: path
      required: true
      description: Opaque patient-product device-registration handle generated and retained by the patient app installation.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    ThreadUuid:
      name: threadUuid
      in: path
      required: true
      description: Opaque patient-product communication thread handle.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    MessageUuid:
      name: messageUuid
      in: path
      required: true
      description: Opaque patient-product message handle within an authorized communication thread.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-generated UUID reused only for an exact replay of this mutation.
      schema:
        $ref: "#/components/schemas/OpaqueUuid"

  securitySchemes:
    patientBearer:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: >-
        A patient-realm credential with exactly one patient ability. Access and
        refresh credentials are not interchangeable.

  responses:
    TokenPairCreated:
      description: Patient session created.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TokenPairSuccessEnvelope"
    TokenPairOk:
      description: Patient session credentials rotated or issued.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TokenPairSuccessEnvelope"
    SessionRevokedOk:
      description: Current patient session revoked.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SessionRevokedSuccessEnvelope"
    PatientSessionListOk:
      description: Active patient device sessions returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientSessionListSuccessEnvelope"
    PatientSessionRevokedOk:
      description: Owned patient session revoked or confirmed already revoked.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientSessionRevocationSuccessEnvelope"
    PatientNotificationDeviceRegistrationOk:
      description: Encrypted notification-device registration accepted without returning provider-token material.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientNotificationDeviceRegistrationSuccessEnvelope"
    PatientNotificationDeviceRevokedOk:
      description: Owned notification-device registration revoked or confirmed already revoked.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientNotificationDeviceRevocationSuccessEnvelope"
    ProfileOk:
      description: Patient-product profile returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProfileSuccessEnvelope"
    EncounterListOk:
      description: Governed encounter handles returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EncounterListSuccessEnvelope"
    TodayProjectionOk:
      description: Latest governed Today projection returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TodayProjectionSuccessEnvelope"
    PathwayProjectionOk:
      description: Latest governed pathway projection returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PathwayProjectionSuccessEnvelope"
    PathwayEventsProjectionOk:
      description: Latest governed pathway-events timeline returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PathwayEventsProjectionSuccessEnvelope"
    DischargeReadinessProjectionOk:
      description: Latest governed discharge-readiness projection returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DischargeReadinessProjectionSuccessEnvelope"
    RoundsSummaryProjectionOk:
      description: Latest released plain-language care-conversation summary returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RoundsSummaryProjectionSuccessEnvelope"
    CareTeamProjectionOk:
      description: Latest governed Care Team projection returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CareTeamProjectionSuccessEnvelope"
    MessageTopicsOk:
      description: Approved communication topics and immediate-help guidance returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageTopicsSuccessEnvelope"
    MessageThreadListOk:
      description: Authorized encounter communication threads returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageThreadListSuccessEnvelope"
    MessageThreadCreated:
      description: Communication thread and initial immutable message accepted atomically.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageThreadMutationSuccessEnvelope"
    MessageThreadDetailOk:
      description: Authorized thread and patient-visible immutable messages returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageThreadDetailSuccessEnvelope"
    PatientMessageCreated:
      description: Patient message accepted exactly once.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientMessageMutationSuccessEnvelope"
    MessageThreadClosedOk:
      description: Thread closure recorded with immutable routing history.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageThreadMutationSuccessEnvelope"
    PatientError:
      description: >-
        Stable patient-safe failure. Unhandled diagnostics and request-derived
        clinical values are never returned.
      headers:
        Cache-Control:
          $ref: "#/components/headers/NoStore"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PatientErrorEnvelope"

  headers:
    NoStore:
      description: Patient responses must not be persisted by shared or private HTTP caches.
      schema:
        type: string
        const: max-age=0, no-store, private

  schemas:
    PatientSuccessEnvelope:
      type: object
      required: [data, meta, links]
      properties:
        data:
          description: Operation-specific patient-safe result.
        meta:
          $ref: "#/components/schemas/PatientMeta"
        links:
          $ref: "#/components/schemas/PatientLinks"
      additionalProperties: false

    PatientErrorEnvelope:
      type: object
      required: [data, error, meta, links]
      properties:
        data:
          type: "null"
        error:
          $ref: "#/components/schemas/PatientErrorDetail"
        errors:
          $ref: "#/components/schemas/PatientValidationErrors"
        meta:
          $ref: "#/components/schemas/PatientMeta"
        links:
          $ref: "#/components/schemas/PatientLinks"
      additionalProperties: false

    PatientMeta:
      type: object
      required: [request_id, generated_at, source_freshness, policy_version]
      properties:
        request_id:
          type: string
          minLength: 1
          description: Correlation handle assigned at ingress.
        generated_at:
          type: string
          format: date-time
        source_freshness:
          $ref: "#/components/schemas/SourceFreshness"
        policy_version:
          type: string
          minLength: 1
          description: Disclosure-policy version applied to the response.
        state_vocabulary_version:
          type: string
          minLength: 1
          description: >-
            Additive patient-state-vocabulary version used by native clients to
            detect a state-language mismatch. It is not an approval of free
            text, translated content, or a clinical release.
        as_of:
          type: string
          format: date-time
          description: Temporary compatibility alias for generated_at.
        stale:
          type: boolean
          description: Temporary compatibility alias; source_freshness is authoritative.
        version:
          type: [integer, "null"]
          minimum: 0
        count:
          type: integer
          minimum: 0
        idempotency_replayed:
          type: boolean
          description: Present on replay-protected mutations; true only when an existing exact result was returned.
      additionalProperties: false

    SourceFreshness:
      type: object
      required: [status, observed_at]
      properties:
        status:
          type: string
          enum:
            [
              current,
              aging,
              stale,
              unknown,
              unavailable,
              no_data,
              not_applicable,
            ]
        observed_at:
          type: [string, "null"]
          format: date-time
        maximum_age_seconds:
          type: [integer, "null"]
          minimum: 0
        reason:
          type: [string, "null"]
          maxLength: 240
      additionalProperties: false

    PatientLinks:
      type: object
      description: Patient-product links only; empty when no safe transition is available.
      additionalProperties:
        type: string
        format: uri-reference

    PatientErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - account_inactive
            - account_locked
            - conflict
            - forbidden
            - invalid_credentials
            - invalid_enrollment_challenge
            - invalid_refresh_token
            - idempotency_conflict
            - messaging_unavailable
            - message_not_amendable
            - not_found
            - patient_realm_required
            - payload_too_large
            - rate_limited
            - request_failed
            - service_unavailable
            - stale_thread_version
            - thread_closed
            - thread_message_limit_reached
            - unauthenticated
            - unsupported_media_type
            - urgent_guidance_changed
            - validation_failed
        message:
          type: string
          minLength: 1
          maxLength: 240
      additionalProperties: false

    PatientValidationErrors:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
          maxLength: 500

    TokenPairSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientTokenPair"

    SessionRevokedSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SessionRevoked"

    PatientSessionListSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientSessionList"

    PatientSessionRevocationSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientSessionRevocation"

    PatientNotificationDeviceRegistrationSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientNotificationDeviceRegistration"

    PatientNotificationDeviceRevocationSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientNotificationDeviceRevocation"

    ProfileSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientProfile"

    EncounterListSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EncounterList"
            meta:
              $ref: "#/components/schemas/EncounterListMeta"

    TodayProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TodayProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    PathwayProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PathwayProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    PathwayEventsProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PathwayEventsProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    DischargeReadinessProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DischargeReadinessProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    RoundsSummaryProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RoundsSummaryProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    CareTeamProjectionSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CareTeamProjection"
            meta:
              $ref: "#/components/schemas/PatientProjectionMeta"

    MessageTopicsSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientMessageTopicsResult"

    MessageThreadListSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientMessageThreadListResult"

    MessageThreadMutationSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientMessageThreadMutationResult"

    MessageThreadDetailSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientMessageThreadDetailResult"

    PatientMessageMutationSuccessEnvelope:
      allOf:
        - $ref: "#/components/schemas/PatientSuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PatientMessageMutationResult"

    EncounterListMeta:
      allOf:
        - $ref: "#/components/schemas/PatientMeta"
        - type: object
          required: [count, version]

    PatientProjectionMeta:
      allOf:
        - $ref: "#/components/schemas/PatientMeta"
        - type: object
          required: [version, as_of, stale]
          properties:
            version:
              type: integer
              minimum: 1
            as_of:
              type: string
              format: date-time
            stale:
              type: boolean

    PatientTokenPair:
      type: object
      required:
        [
          token_type,
          access_token,
          refresh_token,
          expires_in,
          session_uuid,
          abilities,
        ]
      properties:
        token_type:
          type: string
          const: Bearer
        access_token:
          type: string
          minLength: 20
          writeOnly: true
        refresh_token:
          type: string
          minLength: 20
          writeOnly: true
        expires_in:
          type: integer
          minimum: 60
          description: Access credential lifetime in seconds.
        session_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        abilities:
          type: array
          minItems: 1
          maxItems: 1
          prefixItems:
            - type: string
              const: "patient:access"
      additionalProperties: false

    SessionRevoked:
      type: object
      required: [revoked]
      properties:
        revoked:
          type: boolean
          const: true
      additionalProperties: false

    PatientSessionList:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/PatientSessionSummary"
      additionalProperties: false

    PatientSessionSummary:
      type: object
      required:
        - session_uuid
        - current
        - status
        - device
        - auth_method
        - assurance_level
        - last_seen_at
        - expires_at
        - created_at
      properties:
        session_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        current:
          type: boolean
        status:
          type: string
          const: active
        device:
          $ref: "#/components/schemas/PatientSessionDevice"
        auth_method:
          type: string
          enum: [password, enrollment, federated, passkey, recovery]
        assurance_level:
          type: [string, "null"]
          maxLength: 32
        last_seen_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      additionalProperties: false

    PatientSessionDevice:
      type: object
      required: [uuid, platform, name, app_version, os_version]
      properties:
        uuid:
          oneOf:
            - $ref: "#/components/schemas/OpaqueUuid"
            - type: "null"
        platform:
          type: [string, "null"]
          enum: [ios, android, web, null]
        name:
          type: [string, "null"]
          maxLength: 190
        app_version:
          type: [string, "null"]
          maxLength: 80
        os_version:
          type: [string, "null"]
          maxLength: 80
      additionalProperties: false

    PatientSessionRevocation:
      type: object
      required: [session_uuid, revoked, already_revoked]
      properties:
        session_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        revoked:
          type: boolean
          const: true
        already_revoked:
          type: boolean
      additionalProperties: false

    PatientNotificationDeviceRegistrationInput:
      type: object
      required: [platform, environment, installation_uuid, push_token]
      properties:
        platform:
          type: string
          enum: [ios, android]
        environment:
          type: string
          enum: [sandbox, production]
        installation_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        push_token:
          type: string
          minLength: 16
          maxLength: 4096
          writeOnly: true
          description: Provider-issued secret. It is encrypted at rest and never returned or audited.
        app_version:
          type: [string, "null"]
          maxLength: 80
        os_version:
          type: [string, "null"]
          maxLength: 80
        locale:
          type: [string, "null"]
          maxLength: 35
      additionalProperties: false

    PatientNotificationDeviceRegistration:
      type: object
      required: [device]
      properties:
        device:
          $ref: "#/components/schemas/PatientNotificationDevice"
      additionalProperties: false

    PatientNotificationDevice:
      type: object
      required: [device_uuid, platform, environment, status, last_seen_at]
      properties:
        device_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        platform:
          type: string
          enum: [ios, android]
        environment:
          type: string
          enum: [sandbox, production]
        status:
          type: string
          const: active
        last_seen_at:
          type: string
          format: date-time
      additionalProperties: false

    PatientNotificationDeviceRevocation:
      type: object
      required: [device_uuid, revoked, already_revoked]
      properties:
        device_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        revoked:
          type: boolean
          const: true
        already_revoked:
          type: boolean
      additionalProperties: false

    EnrollmentVerificationRequest:
      type: object
      required:
        - challenge_uuid
        - challenge_token
        - verification_code
        - display_name
        - email
        - password
        - password_confirmation
      properties:
        challenge_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        challenge_token:
          type: string
          minLength: 32
          maxLength: 512
          writeOnly: true
        verification_code:
          type: string
          minLength: 6
          maxLength: 32
          writeOnly: true
        display_name:
          type: string
          minLength: 1
          maxLength: 160
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 12
          writeOnly: true
        password_confirmation:
          type: string
          format: password
          minLength: 12
          writeOnly: true
        device:
          $ref: "#/components/schemas/PatientDevice"
      additionalProperties: false

    TokenExchangeRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          maxLength: 1024
          writeOnly: true
        device:
          $ref: "#/components/schemas/PatientDevice"
      additionalProperties: false

    PatientDevice:
      type: object
      properties:
        uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        platform:
          type: string
          enum: [ios, android, web]
        name:
          type: [string, "null"]
          maxLength: 120
        app_version:
          type: [string, "null"]
          maxLength: 40
        os_version:
          type: [string, "null"]
          maxLength: 40
      additionalProperties: false

    PatientPreferencesInput:
      type: object
      properties:
        locale:
          type: string
          minLength: 2
          maxLength: 16
        timezone:
          type: string
          minLength: 1
          maxLength: 64
        text_size:
          type: string
          enum: [standard, large, extra_large]
        reduced_motion:
          type: boolean
        high_contrast:
          type: boolean
        notification_preview:
          type: string
          enum: [hidden, generic]
        preferred_channel:
          type: string
          enum: [push, email, sms, none]
      additionalProperties: false

    PatientProfile:
      type: object
      required:
        - principal_uuid
        - principal_type
        - display_name
        - email_verified
        - phone_verified
        - locale
        - timezone
        - preferences
      properties:
        principal_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        principal_type:
          type: string
          enum: [patient, representative]
        display_name:
          type: string
          maxLength: 160
        email:
          type: [string, "null"]
          format: email
          maxLength: 254
        phone_e164:
          type: [string, "null"]
          pattern: '^\+[1-9][0-9]{7,14}$'
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        locale:
          type: string
          maxLength: 16
        timezone:
          type: string
          maxLength: 64
        preferences:
          $ref: "#/components/schemas/PatientPreferences"
      additionalProperties: false

    PatientPreferences:
      type: object
      properties:
        text_size:
          type: string
          enum: [standard, large, extra_large]
        reduced_motion:
          type: boolean
        high_contrast:
          type: boolean
        notification_preview:
          type: string
          enum: [hidden, generic]
        preferred_channel:
          type: string
          enum: [push, email, sms, none]
      additionalProperties: false

    EncounterList:
      type: object
      required: [encounters]
      properties:
        encounters:
          type: array
          items:
            $ref: "#/components/schemas/PatientEncounterAccess"
      additionalProperties: false

    PatientEncounterAccess:
      type: object
      required:
        [
          encounter_uuid,
          grant_uuid,
          relationship,
          scopes,
          valid_from,
          expires_at,
          version,
        ]
      properties:
        encounter_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        grant_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        relationship:
          type: string
          enum: [self, legal_representative, guardian, caregiver, proxy, other]
        scopes:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_-]*(?::[a-z][a-z0-9_-]*)?$"
        valid_from:
          type: [string, "null"]
          format: date-time
        expires_at:
          type: [string, "null"]
          format: date-time
        version:
          type: integer
          minimum: 1
      additionalProperties: false

    PatientMessageTopicsResult:
      type: object
      required: [topics, immediate_help]
      properties:
        topics:
          type: array
          maxItems: 25
          items:
            $ref: "#/components/schemas/PatientMessageTopic"
        immediate_help:
          $ref: "#/components/schemas/PatientImmediateHelpGuidance"
      additionalProperties: false

    PatientMessageTopic:
      type: object
      required: [code, label, description, expected_response_window]
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,78}[a-z0-9]$"
        label:
          type: string
          minLength: 3
          maxLength: 120
        description:
          type: string
          minLength: 10
          maxLength: 300
        expected_response_window:
          type: string
          minLength: 10
          maxLength: 240
      additionalProperties: false

    PatientImmediateHelpGuidance:
      type: object
      required: [version, text]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 120
        text:
          type: string
          minLength: 20
          maxLength: 500
      additionalProperties: false

    PatientMessageThreadCreateRequest:
      type: object
      description: >-
        Unknown properties are rejected and JSON values are validated without
        type coercion. When an approved `care_preference` or `patient_goal`
        topic and its corresponding default-off feature are both enabled, the
        initial encrypted message is also linked to one patient-authored,
        content-free fact. A preference fact is not a clinical care-plan
        change, order, consent, or assessment; a personal-goal fact is not a
        clinical goal or any clinical care-plan mutation.
      required:
        [topic_code, message, client_message_uuid, urgent_guidance_version]
      properties:
        topic_code:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,78}[a-z0-9]$"
        message:
          type: string
          minLength: 1
          maxLength: 2000
        client_message_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        urgent_guidance_version:
          type: string
          minLength: 1
          maxLength: 120
      additionalProperties: false

    PatientEducationClarificationRequest:
      type: object
      description: >-
        A patient-authored request to explain a released education item. It does
        not attest comprehension, education completion, consent, or any
        clinician assessment. Unknown properties are rejected.
      required: [message, client_message_uuid, urgent_guidance_version]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
        client_message_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        urgent_guidance_version:
          type: string
          minLength: 1
          maxLength: 120
      additionalProperties: false

    PatientMessageCreateRequest:
      type: object
      description: Unknown properties are rejected and thread_version must be a JSON integer.
      required:
        [message, client_message_uuid, thread_version, urgent_guidance_version]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 2000
        client_message_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        thread_version:
          type: integer
          minimum: 1
        urgent_guidance_version:
          type: string
          minLength: 1
          maxLength: 120
      additionalProperties: false

    PatientMessageAmendRequest:
      type: object
      description: >-
        Append one immutable correction or content-free withdrawal to an eligible
        patient-authored message. Unknown properties are rejected and
        thread_version must be a JSON integer.
      required:
        [action, client_message_uuid, thread_version, urgent_guidance_version]
      properties:
        action:
          type: string
          enum: [correction, retraction]
        message:
          type: string
          minLength: 1
          maxLength: 2000
          description: Required only for correction; prohibited for retraction.
        client_message_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        thread_version:
          type: integer
          minimum: 1
        urgent_guidance_version:
          type: string
          minLength: 1
          maxLength: 120
      additionalProperties: false

    MessageThreadCloseRequest:
      type: object
      description: Unknown properties are rejected and thread_version must be a JSON integer.
      required: [thread_version, close_reason]
      properties:
        thread_version:
          type: integer
          minimum: 1
        close_reason:
          type: string
          enum: [question_answered, no_longer_needed, created_in_error, other]
      additionalProperties: false

    PatientMessageThreadListResult:
      type: object
      required: [threads, immediate_help]
      properties:
        threads:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/PatientMessageThreadSummary"
        immediate_help:
          $ref: "#/components/schemas/PatientImmediateHelpGuidance"
      additionalProperties: false

    PatientMessageThreadMutationResult:
      type: object
      required: [thread]
      properties:
        thread:
          $ref: "#/components/schemas/PatientMessageThreadSummary"
      additionalProperties: false

    PatientMessageThreadDetailResult:
      type: object
      required: [thread, immediate_help]
      properties:
        thread:
          $ref: "#/components/schemas/PatientMessageThreadDetail"
        immediate_help:
          $ref: "#/components/schemas/PatientImmediateHelpGuidance"
      additionalProperties: false

    PatientMessageMutationResult:
      type: object
      required: [thread, message]
      properties:
        thread:
          $ref: "#/components/schemas/PatientMessageThreadSummary"
        message:
          $ref: "#/components/schemas/PatientVisibleMessage"
      additionalProperties: false

    PatientMessageThreadSummary:
      allOf:
        - $ref: "#/components/schemas/PatientMessageThreadBase"
      unevaluatedProperties: false

    PatientMessageThreadBase:
      type: object
      required:
        - thread_uuid
        - topic
        - status
        - ownership_state
        - expected_response_window
        - version
        - last_message_at
        - created_at
        - closed_at
        - close_reason
      properties:
        thread_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        topic:
          $ref: "#/components/schemas/PatientMessageThreadTopic"
        status:
          type: string
          enum: [open, closed]
        ownership_state:
          type: string
          enum:
            [
              awaiting_team,
              assigned,
              acknowledged,
              responded,
              rerouted,
              escalated,
              closed,
            ]
        expected_response_window:
          type: string
          minLength: 10
          maxLength: 240
        version:
          type: integer
          minimum: 1
        last_message_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        closed_at:
          type: [string, "null"]
          format: date-time
        close_reason:
          type: [string, "null"]
          enum:
            [question_answered, no_longer_needed, created_in_error, other, null]

    PatientMessageThreadDetail:
      allOf:
        - $ref: "#/components/schemas/PatientMessageThreadBase"
        - type: object
          required: [messages, history_truncated]
          properties:
            messages:
              type: array
              maxItems: 1000
              items:
                $ref: "#/components/schemas/PatientVisibleMessage"
            history_truncated:
              type: boolean
              description: True when older patient-visible facts exist outside the chronologically ordered newest 1,000 facts returned here.
      unevaluatedProperties: false

    PatientMessageThreadTopic:
      type: object
      required: [code, label, description]
      properties:
        code:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,78}[a-z0-9]$"
        label:
          type: string
          minLength: 3
          maxLength: 120
        description:
          type: string
          minLength: 10
          maxLength: 300
      additionalProperties: false

    PatientVisibleMessage:
      type: object
      required:
        - message_uuid
        - sender_display_role
        - message_kind
        - body
        - relates_to_message_uuid
        - delivery_state
        - sent_at
      properties:
        message_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        sender_display_role:
          type: string
          enum: [You, Care team]
        message_kind:
          type: string
          enum: [message, correction, retraction, system_status]
        body:
          type: [string, "null"]
          maxLength: 4000
        relates_to_message_uuid:
          oneOf:
            - $ref: "#/components/schemas/OpaqueUuid"
            - type: "null"
        delivery_state:
          type: string
          enum: [sent, delivered, assigned, acknowledged, responded, closed]
        sent_at:
          type: string
          format: date-time
      additionalProperties: false

    OpaqueUuid:
      type: string
      format: uuid
      pattern: "^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[1-8][0-9A-Fa-f]{3}-[89AaBb][0-9A-Fa-f]{3}-[0-9A-Fa-f]{12}$"
      description: Patient-product handle with no embedded source-system meaning.

    PatientProjectionBase:
      type: object
      required:
        - projection_uuid
        - encounter_uuid
        - kind
        - content
        - uncertainty
        - provenance
        - observed_at
        - generated_at
        - released_at
      properties:
        projection_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        encounter_uuid:
          $ref: "#/components/schemas/OpaqueUuid"
        kind:
          type: string
          enum:
            [
              today,
              pathway,
              pathway_events,
              discharge_readiness,
              rounds_summary,
              care_team,
            ]
        content:
          type: object
          description: Kind-specific, patient-language content released under policy.
        uncertainty:
          $ref: "#/components/schemas/ProjectionUncertainty"
        provenance:
          $ref: "#/components/schemas/ProjectionProvenance"
        revision_notice:
          $ref: "#/components/schemas/PatientProjectionRevisionNotice"
        observed_at:
          type: string
          format: date-time
        generated_at:
          type: string
          format: date-time
        released_at:
          type: string
          format: date-time
      additionalProperties: false

    PatientProjectionRevisionNotice:
      type: object
      description: >-
        A bounded acknowledgement shown only on an already authorized,
        separately released correction replacement. It never includes the
        withdrawn projection identifier, correction reason, actor, or timing.
      required: [kind, message]
      properties:
        kind:
          type: string
          enum: [correction]
        message:
          $ref: "#/components/schemas/PatientLanguageText"
      additionalProperties: false

    TodayProjection:
      allOf:
        - $ref: "#/components/schemas/PatientProjectionBase"
        - type: object
          properties:
            kind:
              type: string
              const: today
            content:
              $ref: "#/components/schemas/TodayProjectionContent"

    PathwayProjection:
      allOf:
        - $ref: "#/components/schemas/PatientProjectionBase"
