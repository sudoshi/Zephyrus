          properties:
            kind:
              type: string
              const: care_team
            content:
              $ref: "#/components/schemas/CareTeamProjectionContent"

    ProjectionProvenance:
      type: object
      required:
        [
          projection_method,
          source_class,
          input_classes,
          review_state,
          producer_version,
        ]
      properties:
