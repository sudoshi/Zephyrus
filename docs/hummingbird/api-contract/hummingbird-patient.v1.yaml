          $ref: "#/components/schemas/PatientLanguageText"
        summary:
          $ref: "#/components/schemas/PatientLanguageText"
        members:
          type: array
          items:
            $ref: "#/components/schemas/PatientCareTeamMember"
        communication_options:
          type: array
          items:
            $ref: "#/components/schemas/PatientCommunicationOption"
        questions:
          $ref: "#/components/schemas/PatientLanguageList"
        notices:
