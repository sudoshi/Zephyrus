            content:
              $ref: "#/components/schemas/PathwayEventsProjectionContent"

    DischargeReadinessProjection:
      allOf:
        - $ref: "#/components/schemas/PatientProjectionBase"
        - type: object
          properties:
            kind:
              type: string
              const: discharge_readiness
            content:
              $ref: "#/components/schemas/DischargeReadinessProjectionContent"

    RoundsSummaryProjection:
