version: 1
as_of: "2026-07-20"
sources:
  navigation: resources/js/config/navigationConfig.ts
  web_routes: routes/web.php
  api_routes: routes/api.php
  staff_contract: docs/hummingbird/api-contract/hummingbird-bff.v1.yaml
  patient_contract: docs/hummingbird/api-contract/hummingbird-patient.v1.yaml
  role_catalog: docs/hummingbird/role-catalog.v1.json
architecture_decisions:
  native_contracts: docs/hummingbird/ADR-2026-07-19-generated-native-contracts.md
  patient_boundary: docs/hummingbird/ADR-2026-07-19-patient-product-boundary.md
  patient_projection: docs/hummingbird/ADR-2026-07-19-patient-projection-source-of-truth.md
  patient_fhir_boundary: docs/hummingbird/ADR-2026-07-19-patient-fhir-boundary.md
notes:
  - A target disposition is the approved implementation direction, not a claim of completion.
  - Empty native route lists are allowed for planned work; a NATIVE capability may never name only one native platform.
  - Patient API operations are owned independently from staff mobile and authentication operations.
  - authorization_capabilities maps exact app/Authorization/Capability enum cases to gated operations; effective responsibility-pool membership remains independently required.
  - Product and engineering owners are accountable groups until the governance review assigns named individuals.

role_sets:
  all_staff:
    - charge_nurse
    - bedside_nurse
    - bed_manager
    - house_supervisor
    - hospitalist
    - intensivist
    - evs
    - transport
    - or_nurse
    - capacity_lead
    - periop_manager
    - staffing_coordinator
    - pi_lead
    - executive
  capacity_operations:
    [charge_nurse, bed_manager, house_supervisor, capacity_lead]
  inpatient_care_team: [charge_nurse, bedside_nurse, hospitalist, intensivist]
  patient_communication_responders:
