name: HummingbirdPatient
options:
  bundleIdPrefix: net.acumenus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  HummingbirdPatient:
    type: application
    platform: iOS
    sources:
      - HummingbirdPatient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.patient
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: TKXPY255A2
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: HummingbirdPatient/Info.plist
      properties:
        CFBundleDisplayName: Hummingbird Patient
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        HBPPatientAPIEnabled: false
        HBPPatientAPIBaseURL: ""

  HummingbirdPatientTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HummingbirdPatientTests
    dependencies:
      - target: HummingbirdPatient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.patient.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HummingbirdPatient.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HummingbirdPatient"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HummingbirdPatientUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HummingbirdPatientUITests
    dependencies:
      - target: HummingbirdPatient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.patient.ui-tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  HummingbirdPatient:
    build:
      targets:
        HummingbirdPatient: all
        HummingbirdPatientTests:
          - test
        HummingbirdPatientUITests:
          - test
    test:
      targets:
        - HummingbirdPatientTests
        - HummingbirdPatientUITests
