name: Hummingbird
options:
  bundleIdPrefix: net.acumenus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  Hummingbird:
    type: application
    platform: iOS
    sources:
      - Hummingbird
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: TKXPY255A2
        CODE_SIGN_STYLE: Automatic
        # iPhone-only (1). Portrait-first companion app; avoids the iPad all-orientations rule.
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # APNs: dev builds use the sandbox; TestFlight/App Store builds must use production.
        Debug:
          CODE_SIGN_ENTITLEMENTS: Hummingbird/Hummingbird.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Hummingbird/Hummingbird.production.entitlements
    info:
      path: Hummingbird/Info.plist
      properties:
        CFBundleDisplayName: Hummingbird
        NSFaceIDUsageDescription: Unlock Hummingbird with Face ID.
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        # App uses only standard HTTPS/TLS (exempt) — skips the export-compliance prompt per upload.
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
