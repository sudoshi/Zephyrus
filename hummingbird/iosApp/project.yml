name: Hummingbird
options:
  bundleIdPrefix: net.acumenus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
schemes:
  Hummingbird:
    build:
      targets:
        Hummingbird: all
    test:
      targets:
        - name: HummingbirdTests
          parallelizable: false
        - name: HummingbirdUITests
          parallelizable: false
targets:
  Hummingbird:
    type: application
    platform: iOS
    sources:
      - Hummingbird
    dependencies:
      - target: HummingbirdWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: TKXPY255A2
        CODE_SIGN_STYLE: Automatic
        # iPhone-only (1). Portrait-first companion app; avoids the iPad all-orientations rule.
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # APNs: dev builds use the sandbox; TestFlight/App Store builds must use production.
        Debug:
          CODE_SIGN_ENTITLEMENTS: Hummingbird/Hummingbird.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Hummingbird/Hummingbird.production.entitlements
    info:
      path: Hummingbird/Info.plist
      properties:
        CFBundleDisplayName: Hummingbird
        # Drive the build number from CURRENT_PROJECT_VERSION so archive-testflight.sh's
        # per-upload build number actually lands in the bundle (App Store Connect rejects
        # duplicate build numbers). Without this XcodeGen writes a literal "1".
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSFaceIDUsageDescription: Unlock Hummingbird with Face ID.
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        # App uses only standard HTTPS/TLS (exempt) — skips the export-compliance prompt per upload.
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Live Activities (locally driven: trips + bed turns update per lifecycle tap).
        NSSupportsLiveActivities: true

  HummingbirdWidgets:
    type: app-extension
    platform: iOS
    sources:
      - HummingbirdWidgets
      # Shared Live Activity contract (attributes + palette + step order) and the
      # App-Group snapshot cache the glance widget reads.
      - Hummingbird/LiveActivity/JobActivityAttributes.swift
      - Hummingbird/LiveActivity/HouseGlanceCache.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.HummingbirdWidgets
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: TKXPY255A2
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: HummingbirdWidgets/HummingbirdWidgets.entitlements
    info:
      path: HummingbirdWidgets/Info.plist
      properties:
        CFBundleDisplayName: Hummingbird
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  HummingbirdTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HummingbirdTests
    dependencies:
      - target: Hummingbird
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TKXPY255A2

  HummingbirdUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HummingbirdUITests
    dependencies:
      - target: Hummingbird
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.acumenus.hummingbird.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: TKXPY255A2
