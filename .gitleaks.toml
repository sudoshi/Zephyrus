title = "Zephyrus secret-scanning policy"

[extend]
useDefault = true

# Keep this file intentionally narrow. Exceptions must identify an exact safe
# test fixture or public identifier; paths such as .env.production must never
# be globally allowlisted.
[[allowlists]]
description = "Generated dependency and scan-output trees; their manifests are audited separately"
paths = [
  '''(^|/)vendor/''',
  '''(^|/)node_modules/''',
  '''(^|/)public/build/''',
  '''(^|/)artifacts/''',
]

[[allowlists]]
# Public diversion-model scenario identifier ('critical-care-surge-v1') used as
# both modelVersionKey and version_key in the seeded regional network — a
# display label, not a credential. Pre-dates this policy on main; AND-scoped to
# the one file + exact string so nothing else in the file is exempted.
description = "RegionalTransferService seeded model-version identifiers (public labels)"
condition = "AND"
paths = ['''^app/Services/Transport/RegionalTransferService\.php$''']
regexes = ['''critical-care-surge-v1''']

[[allowlists]]
# Deterministic test-only message-encryption *version labels*, not keys. The
# generic API-key rule recognizes the adjacent PHP map syntax as credential
# material. Scope the exception to the exact fixtures and public test labels;
# encryption key values, production configuration, and all other test files
# remain subject to scanning.
description = "Patient communication fixture key-version labels"
condition = "AND"
paths = [
  '''^tests/Feature/Patient/PatientAuthoredGoalApiTest\.php$''',
  '''^tests/Feature/Patient/PatientCarePreferenceApiTest\.php$''',
  '''^tests/Feature/Patient/PatientCommunicationEscalationServiceTest\.php$''',
  '''^tests/Feature/Patient/PatientEducationClarificationApiTest\.php$''',
  '''^tests/Feature/Patient/PatientMessagingApiTest\.php$''',
  '''^tests/Feature/Patient/PatientStaffMessageHandoffConsumerTest\.php$''',
  '''^tests/Feature/Patient/StaffPatientCommunicationApiTest\.php$''',
]
# Gitleaks applies an allowlist regex to the captured secret value, not the
# complete PHP assignment expression.
regexes = ['''test-encryption-key-v1''']

[[allowlists]]
# Same precise exception for the rounds-promotion fixture's public version
# label. It is deliberately not a wildcard for all rounds tests.
description = "Patient rounds fixture key-version label"
condition = "AND"
paths = ['''^tests/Feature/Rounds/PatientRoundQuestionPromotionTest\.php$''']
# See the preceding allowlist: match the captured deterministic fixture value.
regexes = ['''test-rounds-question-key-v1''']
