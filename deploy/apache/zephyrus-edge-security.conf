# Zephyrus production edge policy. Include this file from inside the
# zephyrus.acumenus.net TLS VirtualHost. Do not wrap this include in IfModule:
# an unavailable ModSecurity module must make Apache validation fail closed.

TraceEnable Off
LimitRequestBody 10485760
LimitRequestFieldSize 8190
LimitRequestFields 100

Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "DENY"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
Header always set Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()"

SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyLimitAction Reject
SecResponseBodyAccess Off
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"

# OWASP CRS variables are scoped per transaction. The Debian security2 module
# configuration loads the CRS ruleset; these actions tighten its block level
# and align CRS method enforcement with Zephyrus's explicit REST method policy.
SecAction "id:1000001,phase:1,pass,nolog,setvar:'tx.allowed_methods=GET HEAD POST PUT PATCH DELETE OPTIONS',setvar:tx.inbound_anomaly_score_threshold=5,setvar:tx.outbound_anomaly_score_threshold=4"

SecRule REQUEST_METHOD "!@within GET HEAD POST PUT PATCH DELETE OPTIONS" \
    "id:1000002,phase:1,deny,status:405,log,msg:'Zephyrus rejected unsupported HTTP method'"

SecRule REQUEST_URI "@rx (?i)^/(?:\\.env|\\.git|storage|vendor)(?:/|$)" \
    "id:1000003,phase:1,deny,status:404,log,msg:'Zephyrus blocked sensitive filesystem path'"

SecRule REQUEST_URI "@rx (?i)^/(?:artisan|composer\\.(?:json|lock)|package(?:-lock)?\\.json|phpunit\\.xml)(?:$|/)" \
    "id:1000004,phase:1,deny,status:404,log,msg:'Zephyrus blocked sensitive project artifact'"

# The application enforces route-specific 1 MiB limits. This edge rule rejects
# oversized API bodies before PHP allocates or parses them; the staffing import
# route retains the vhost-wide 10 MiB ceiling.
SecRule REQUEST_URI "@beginsWith /api/" \
    "id:1000005,phase:1,deny,status:413,log,msg:'Zephyrus rejected oversized API request body',chain"
    SecRule REQUEST_URI "!@streq /api/deployment/staffing/imports" \
        "chain"
        SecRule REQUEST_HEADERS:Content-Length "@gt 1048576" \
            "t:none"
